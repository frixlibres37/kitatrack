<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KitaTrack POS</title>
<meta name="theme-color" content="#16a34a">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ac:#16a34a;--ac2:#15803d;--bg:#f8fafc;--txt:#1e293b;--muted:#64748b;--bd:#e2e8f0;--card:#fff;--warn:#f59e0b;--danger:#dc2626}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
button,input,select,textarea{font-family:inherit}
button{border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ac);outline-offset:-1px}
a{text-decoration:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border-bottom:1px solid var(--bd);gap:10px}
.hdr-l{display:flex;align-items:center;gap:8px;min-width:0}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.logo-img{flex-shrink:0}
.hdr-t{font-weight:800;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-s{font-size:10px;color:#94a3b8}
.plan-pill,.demo-badge,.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:4px 8px;border-radius:999px;border:1px solid}
.plan-pill{background:color-mix(in srgb,var(--ac) 10%,white);color:var(--ac);border-color:color-mix(in srgb,var(--ac) 25%,white)}
.demo-badge{background:#fef3c7;color:#92400e;border-color:#fde68a}
.status-pill{background:#f1f5f9;color:#475569;border-color:#cbd5e1}
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.nav{display:flex;border-top:1px solid var(--bd);background:#fff;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;background:none;font-size:10px;color:#94a3b8;gap:2px;position:relative}
.nav button.act{color:var(--ac);font-weight:700}
.stats{display:flex;gap:8px;padding:10px 14px;overflow-x:auto}
.stat{flex:0 0 auto;min-width:114px;padding:10px;background:#fff;border-radius:12px;border:1px solid var(--bd)}
.stat-l{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.stat-v{font-size:18px;font-weight:800;color:var(--ac);margin-top:2px}
.toolbar{display:flex;gap:8px;padding:0 14px 10px}
.sbox,.ibox{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff;border-radius:12px;border:1px solid var(--bd)}
.sbox{margin:0 14px 8px}
.sbox input,.ibox input{flex:1;border:none;outline:none;font-size:14px;background:transparent}
.cats{display:flex;gap:6px;padding:0 14px 8px;overflow-x:auto}
.cat{flex:0 0 auto;padding:6px 12px;border-radius:18px;font-size:11px;font-weight:700;background:#f1f5f9;color:#475569}
.cat.act{background:var(--ac);color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:8px;padding:0 14px 100px}
.pcard{padding:10px 8px;border-radius:12px;border:2px solid var(--bd);text-align:left;position:relative;min-height:102px;background:#fff}
.pcard.in{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 5%,#fff)}
.pcard .fav{position:absolute;top:6px;left:6px;font-size:12px}
.pcard .qb{position:absolute;top:6px;right:6px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pcard .nm{font-weight:700;font-size:12px;line-height:1.3;margin:18px 0 2px}
.pcard .pr{font-weight:800;font-size:14px;color:var(--ac)}
.pcard .st{font-size:9px;font-weight:700;margin-top:2px;color:#94a3b8}
.pcard .ct{font-size:9px;color:#94a3b8}
.fav-wrap{padding:0 14px 8px}
.fav-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px}
.fav-row{display:flex;gap:6px;overflow:auto}
.fchip{flex:0 0 auto;padding:8px 12px;border-radius:10px;background:#fff;border:1px solid var(--bd);font-size:12px;font-weight:700;color:#334155}
.fcart{position:fixed;bottom:58px;left:12px;right:12px;color:#fff;padding:12px 18px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;z-index:50;background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 12px 30px rgba(0,0,0,.12)}
.cpanel{position:fixed;bottom:0;left:0;right:0;top:28%;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.12);display:flex;flex-direction:column;z-index:60}
.cpanel .ch{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f1f5f9}
.cpanel .ci{flex:1;overflow-y:auto;padding:0 16px}
.citem{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f8fafc;gap:6px}
.qbtn{width:28px;height:28px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800}
.cpanel .cf{padding:12px 16px;border-top:1px solid var(--bd)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9}
.bigbtn{width:100%;padding:13px;border-radius:12px;color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.row{display:flex;align-items:center;padding:10px;background:#fff;border-radius:12px;border:1px solid var(--bd);gap:8px;margin-bottom:6px}
.toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 18px;border-radius:12px;font-weight:700;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.empty{padding:32px 20px;text-align:center;color:#94a3b8;font-size:14px}
.qk{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.qk button{padding:8px 12px;border-radius:10px;font-weight:700;font-size:13px;background:#f1f5f9;color:#334155}
.section{padding:14px}
.section h2{font-weight:800;font-size:16px;margin-bottom:10px}
.section h3{font-weight:800;font-size:14px;margin:16px 0 8px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid #f1f5f9;font-size:13px}
.card{background:#fff;border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px}
.pillbar{display:flex;gap:6px;overflow:auto;padding-bottom:6px}
.pill{flex:0 0 auto;padding:7px 12px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:12px;font-weight:700}
.pill.act{background:var(--ac);color:#fff}
textarea{min-height:82px;resize:vertical}
.filein{display:none}
.small{font-size:12px;color:var(--muted)}
.notice{padding:12px;border-radius:12px;background:#f8fafc;border:1px solid var(--bd);font-size:13px;color:#475569;line-height:1.5}
.locked{opacity:.75}
.lock-icon{width:24px;height:24px;border-radius:8px;background:color-mix(in srgb,var(--ac) 15%,#fff);display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:12px;font-weight:800}
.bad{color:var(--danger)}
.good{color:var(--ac)}
.warn{color:#d97706}
.setup-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(180deg,#f0fdf4 0%,#fff 60%)}
.setup-card{width:100%;max-width:430px;background:#fff;border:1px solid var(--bd);border-radius:24px;padding:22px;box-shadow:0 10px 30px rgba(0,0,0,.06)}
.setup-logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.setup-title{font-size:23px;font-weight:900;text-align:center}
.setup-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.5;margin:8px 0 20px}
.choice{padding:14px;border:2px solid var(--bd);border-radius:14px;margin-bottom:10px;background:#fff;text-align:left}
.choice.act{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 5%,#fff)}
.toplink{display:inline-flex;align-items:center;gap:6px;color:var(--ac);font-weight:700;font-size:13px}
@media (min-width:760px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr))}
}
</style>
</head>
<body>

<script>
const params = new URLSearchParams(location.search);
// SECURITY NOTE: DEMO_MODE bypasses license verification entirely when the URL contains ?demo=true.
// This is intentional for sales demos, but the URL can be shared or guessed by end users to access
// the full POS interface without a valid license. If demo access needs to be controlled, require a
// short-lived demo token validated server-side rather than a plain URL parameter.
const DEMO_MODE = params.get('demo') === 'true';
const urlPlan = (params.get('plan') || '').toLowerCase();
const VALID_PLANS = ['basic','business','pro'];
const DEFAULT_PLAN = 'basic';
const PLAN_COLORS = { basic:'#16a34a', business:'#2563eb', pro:'#9333ea' };
const PLAN_DARK = { basic:'#15803d', business:'#1d4ed8', pro:'#7e22ce' };
const PLAN_NAMES = { basic:'Basic', business:'Business', pro:'Pro' };
const FEATURES = {
  basic:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview'],
  business:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview','inventory','reports','lowStock','backup','discounts'],
  pro:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview','inventory','reports','lowStock','backup','discounts','barcode','roles','advancedReports','stockHistory','keyboardShortcuts','deviceLock']
};

const SUPA_URL = 'https://lrixoqxtgfnwadbospae.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaXhvcXh0Z2Zud2FkYm9zcGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5ODksImV4cCI6MjA5MDcwMjk4OX0.cVg3UDzPdIAgLci7TYWeschTR1tZCzXxcC-DQW6J1QY';

function getSafePlan(v){ return VALID_PLANS.includes(v) ? v : DEFAULT_PLAN; }
function has(f){ return FEATURES[PLAN]?.includes(f); }
function skey(k){ return `kt_${PLAN}_${k}`; }
function ukey(k){ return `kt_unified_${k}`; }
function peso(n){ return '₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric'}); }
function fmtTime(d){ return new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}); }

function loadJson(key, fallback=null){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}

let savedLicense = loadJson(ukey('license'));
let licensed = false;
let licenseData = null;
if(savedLicense && savedLicense.valid && (!savedLicense.expires || new Date(savedLicense.expires) > new Date())){
  licensed = true;
  licenseData = savedLicense;
}

let PLAN = licensed && licenseData?.plan ? getSafePlan(licenseData.plan) : getSafePlan(urlPlan || DEFAULT_PLAN);
document.documentElement.style.setProperty('--ac', PLAN_COLORS[PLAN]);
document.documentElement.style.setProperty('--ac2', PLAN_DARK[PLAN]);

const sampleProducts = [
  {id:1,name:"Yosi (per stick)",price:8,cost:6,stock:200,cat:"tobacco",fav:false},
  {id:2,name:"Coke Mismo",price:15,cost:11,stock:48,cat:"drinks",fav:true},
  {id:3,name:"Royal Mismo",price:15,cost:11,stock:36,cat:"drinks",fav:false},
  {id:4,name:"C2 Apple",price:25,cost:19,stock:24,cat:"drinks",fav:false},
  {id:5,name:"Kopiko 78°C",price:30,cost:23,stock:20,cat:"drinks",fav:true},
  {id:6,name:"Lucky Me Pancit Canton",price:14,cost:11,stock:60,cat:"food",fav:true},
  {id:7,name:"Sky Flakes",price:8,cost:6,stock:40,cat:"food",fav:false},
  {id:8,name:"Boy Bawang",price:10,cost:8,stock:30,cat:"food",fav:false},
  {id:9,name:"Safeguard Sachet",price:8,cost:6,stock:50,cat:"essentials",fav:false},
  {id:10,name:"Surf Powder (tingi)",price:7,cost:5,stock:80,cat:"essentials",fav:false},
  {id:11,name:"Load ₱10",price:10,cost:10,stock:999,cat:"services",fav:false},
  {id:12,name:"Bigas (per kilo)",price:55,cost:48,stock:50,cat:"food",fav:false},
  {id:13,name:"Nescafe 3-in-1",price:8,cost:6,stock:100,cat:"drinks",fav:false},
  {id:14,name:"Piattos Cheese",price:18,cost:13,stock:25,cat:"food",fav:false}
];

let settings = (DEMO_MODE ? null : loadJson(skey('settings'))) || {
  storeName:'KitaTrack Store',
  receiptFooter:'Thank you! Balik po kayo.',
  autoPrint:false
};
let setupState = DEMO_MODE
  ? { done:true, step:2, useSample:true, storeName:`KitaTrack ${PLAN_NAMES[PLAN]} Demo` }
  : (loadJson(skey('setup')) || { done:false, step:1, useSample:true, storeName:'' });

let products = DEMO_MODE
  ? structuredClone(sampleProducts)
  : (loadJson(skey('products')) || (setupState.done && !setupState.useSample ? [] : structuredClone(sampleProducts)));

let sales = DEMO_MODE ? [] : (loadJson(skey('sales')) || []);
let stockLog = DEMO_MODE ? [] : (loadJson(skey('stocklog')) || []);
let users = DEMO_MODE ? [{name:'Owner',role:'admin',pin:'1234'}] : (loadJson(skey('users')) || [{name:'Owner',role:'admin',pin:'1234'}]);
let cart = [];
let screen = 'pos';
let selCat = 'all';
let search = '';
let showCart = false;
let showCheckout = false;
let toast = null;
let upgradeModal = null;
let showQuickAdd = false;
let showSettings = false;
let exportPayload = '';
let receiptSale = null;
let discountMode = 'none';
let discountValue = '';
let discountLabel = '';
let filters = { history:'all', report:'today' };

function saveJson(key, value){
  if(DEMO_MODE) return;
  localStorage.setItem(key, JSON.stringify(value));
}

function saveSettings(){ saveJson(skey('settings'), settings); }
function saveProducts(){ saveJson(skey('products'), products); }
function saveSales(){ saveJson(skey('sales'), sales); }
function saveStockLog(){ saveJson(skey('stocklog'), stockLog); }
function saveUsers(){ saveJson(skey('users'), users); }
function saveSetup(){ saveJson(skey('setup'), setupState); }
function saveAll(){ saveSettings(); saveProducts(); saveSales(); saveStockLog(); saveUsers(); saveSetup(); }

function showToast(msg, err=false){
  toast = { msg, err };
  render();
  clearTimeout(showToast.t);
  showToast.t = setTimeout(()=>{ toast=null; render(); }, 2200);
}

function startSetup(useSample){
  setupState.useSample = useSample;
  setupState.done = true;
  settings.storeName = (setupState.storeName || 'KitaTrack Store').trim() || 'KitaTrack Store';
  if(useSample){
    products = loadJson(skey('products')) || structuredClone(sampleProducts);
  }else{
    products = [];
  }
  saveAll();
  render();
}

function completeSetupStep1(){
  const v = (document.getElementById('setupStoreName')?.value || '').trim();
  if(!v) return showToast('Enter store name first.', true);
  setupState.storeName = v;
  settings.storeName = v;
  setupState.step = 2;
  saveSettings();
  saveSetup();
  render();
}

function resetDemoData(){
  if(!confirm('Reset demo data for this plan?')) return;

  [
    'settings',
    'products',
    'sales',
    'stocklog',
    'users',
    'setup'
  ].forEach(k => localStorage.removeItem(skey(k)));

  settings = {
    ...settings,
    storeName: `KitaTrack ${PLAN_NAMES[PLAN]} Demo`
  };
  setupState = { done:true, step:2, useSample:true, storeName: settings.storeName };
  products = structuredClone(sampleProducts);
  sales = [];
  stockLog = [];
  users = [{name:'Owner',role:'admin',pin:'1234'}];
  cart = [];

  showToast('Demo reset complete.');
  render();
}
  if(!confirm('Reset demo data for this plan?')) return;
  localStorage.removeItem(skey('products'));
  localStorage.removeItem(skey('sales'));
  localStorage.removeItem(skey('stocklog'));
  products = structuredClone(sampleProducts);
  sales = [];
  stockLog = [];
  cart = [];
  showToast('Demo reset complete.');
  saveProducts(); saveSales(); saveStockLog();
  render();
}

function getSubtotal(){ return cart.reduce((s,c)=>s + (c.price * c.qty), 0); }

function getDiscountAmount(){
  const subtotal = getSubtotal();
  if(!has('discounts')) return 0;
  const value = Number(discountValue || 0);
  if(discountMode === 'percent') return Math.min(subtotal, subtotal * (value/100));
  if(discountMode === 'fixed') return Math.min(subtotal, value);
  return 0;
}

function cartTotal(){ return Math.max(0, getSubtotal() - getDiscountAmount()); }
function cartCount(){ return cart.reduce((s,c)=>s+c.qty,0); }

function addToCart(p){
  if(has('inventory') && Number(p.stock||0) <= 0) return showToast('Out of stock!', true);
  const ex = cart.find(c => c.id === p.id);
  if(ex){
    if(has('inventory') && ex.qty >= Number(p.stock||0)) return showToast('Max stock!', true);
    ex.qty++;
  }else{
    cart.push({...p, qty:1});
  }
  render();
}

function updQty(id, d){
  const c = cart.find(x => x.id === id);
  const p = products.find(x => x.id === id);
  if(!c || !p) return;
  const next = c.qty + d;
  if(next <= 0){
    rmCart(id);
    return;
  }
  if(has('inventory') && next > Number(p.stock||0)) return showToast('Max stock reached!', true);
  c.qty = next;
  render();
}

function rmCart(id){
  cart = cart.filter(c => c.id !== id);
  render();
}

function favoriteProducts(){
  return products.filter(p => p.fav);
}

function toggleFav(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  p.fav = !p.fav;
  saveProducts();
  render();
}

function addProductFromModal(){
  const name = (document.getElementById('qaName')?.value || '').trim();
  const price = Number(document.getElementById('qaPrice')?.value || 0);
  const cost = Number(document.getElementById('qaCost')?.value || 0);
  const stock = Number(document.getElementById('qaStock')?.value || 0);
  const cat = (document.getElementById('qaCat')?.value || 'general').trim().toLowerCase();
  if(!name || price <= 0) return showToast('Enter product name and price.', true);
  const id = Date.now();
  products.unshift({id,name,price,cost,stock:has('inventory')?stock:999,cat,fav:false});
  saveProducts();
  showQuickAdd = false;
  showToast('Product added.');
  render();
}

function exportCsv(){
  const rows = [['Date','Items','Total','Cash','Change']];
  sales.forEach(s => rows.push([
    new Date(s.date).toLocaleString('en-PH'),
    s.items.map(i=>`${i.name} x${i.qty}`).join(' | '),
    s.total,
    s.cash,
    s.change
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${settings.storeName.replace(/\s+/g,'-').toLowerCase()}-${PLAN}-sales.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportBackup(){
  const payload = JSON.stringify({ plan:PLAN, settings, products, sales, stockLog, users }, null, 2);
  exportPayload = payload;
  const blob = new Blob([payload], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${settings.storeName.replace(/\s+/g,'-').toLowerCase()}-${PLAN}-backup.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup exported.');
}

function importBackup(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      settings = data.settings || settings;
      products = data.products || [];
      sales = data.sales || [];
      stockLog = data.stockLog || [];
      users = data.users || users;
      saveAll();
      showToast('Backup restored.');
      render();
    }catch(e){
      showToast('Invalid backup file.', true);
    }
  };
  r.readAsText(file);
}

function previewReceipt(sale){
  receiptSale = sale;
  render();
}

function completeSale(cash){
  const total = cartTotal();
  const subtotal = getSubtotal();
  const discount = getDiscountAmount();
  const sale = {
    id: Date.now(),
    items: cart.map(c => ({...c})),
    subtotal,
    discount,
    discountMode,
    discountValue: Number(discountValue||0),
    discountLabel,
    total,
    cash,
    change: cash-total,
    date: new Date().toISOString()
  };
  sales.unshift(sale);
  if(has('inventory')){
    cart.forEach(c => {
      const p = products.find(x => x.id === c.id);
      if(p){
        const before = Number(p.stock||0);
        p.stock = Math.max(0, before - c.qty);
        if(has('stockHistory')){
          stockLog.unshift({
            at: sale.date,
            productId: p.id,
            productName: p.name,
            type: 'sale',
            qty: -c.qty,
            before,
            after: p.stock
          });
        }
      }
    });
  }
  cart = [];
  showCheckout = false;
  showCart = false;
  discountMode = 'none';
  discountValue = '';
  discountLabel = '';
  saveProducts();
  saveSales();
  saveStockLog();
  showToast('Sale complete! ✓');
  previewReceipt(sale);
}

function salesInRange(mode){
  const now = new Date();
  return sales.filter(s => {
    const d = new Date(s.date);
    if(mode === 'today') return d.toDateString() === now.toDateString();
    if(mode === 'week'){
      const start = new Date(now); start.setDate(now.getDate()-6); start.setHours(0,0,0,0);
      return d >= start;
    }
    if(mode === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

function topProducts(list){
  const pm = {};
  list.forEach(s => s.items.forEach(it => {
    pm[it.name] = (pm[it.name] || 0) + it.qty;
  }));
  return Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);
}

function profitForSale(s){
  return s.items.reduce((sum,it) => sum + ((Number(it.price||0) - Number(it.cost||0)) * Number(it.qty||0)), 0) - Number(s.discount||0);
}

function totalProfit(list){
  return list.reduce((sum,s) => sum + profitForSale(s), 0);
}

function lowStockItems(){
  return products.filter(p => Number(p.stock||0) <= 5);
}

async function verifyLicense(key){
  try{
    const res = await fetch(`${SUPA_URL}/rest/v1/licenses?license_key=eq.${encodeURIComponent(key)}&status=eq.active&select=*`, {
      headers:{ 'apikey':SUPA_KEY, 'Authorization':'Bearer '+SUPA_KEY }
    });
    const data = await res.json();
    if(data && data.length){
      const lic = data[0];
      if(lic.expires_at && new Date(lic.expires_at) < new Date()) return { valid:false, error:'License expired. Please renew.' };
      const info = { valid:true, key, plan:lic.plan, name:lic.customer_name, expires:lic.expires_at || null };
      localStorage.setItem(ukey('license'), JSON.stringify(info));
      return info;
    }
    return { valid:false, error:'Invalid license key.' };
  }catch(e){
    const saved = loadJson(ukey('license'));
    if(saved?.valid) return saved;
    return { valid:false, error:'Cannot verify offline. Connect to internet first.' };
  }
}

async function doVerify(){
  const key = (document.getElementById('licKey')?.value || '').trim();
  if(!key) return;
  document.getElementById('licErr').innerHTML = '<div class="small" style="text-align:center">Verifying...</div>';
  const result = await verifyLicense(key);
  if(result.valid){
    licensed = true;
    licenseData = result;
    PLAN = getSafePlan(result.plan);
    location.href = `${location.pathname}?plan=${PLAN}`;
  }else{
    document.getElementById('licErr').innerHTML = `<div class="notice" style="background:#fef2f2;border-color:#fecaca;color:#dc2626">${result.error}</div>`;
  }
}

function logoutLicense(){
  if(!confirm('Remove saved license on this device?')) return;
  localStorage.removeItem(ukey('license'));
  location.href = `${location.pathname}?plan=basic`;
}

                ${discountMode!=='none' ? `<input id="discInput" type="number" value="${discountValue}" placeholder="${discountMode==='percent'?'Percent':'Amount'}" oninput="discountValue=this.value;render()">` : ``}
                ${getDiscountAmount()>0 ? `<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>Discount</span><strong class="warn">-${peso(getDiscountAmount())}</strong></div>` : ``}
              </div>` : `
              <button class="pill" onclick="openUpgrade('discounts')">🔒 Discount system</button>`}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:2px solid #e2e8f0;margin-bottom:12px;font-weight:800">
            <span>TOTAL</span><span style="font-size:28px;color:${AC}">${peso(cartTotal())}</span>
          </div>
          <div class="qk">${[20,50,100,200,500,1000].map(a=>`<button onclick="document.getElementById('cashIn').value=${a};updateChange()">${peso(a)}</button>`).join('')}</div>
          <label class="small" style="display:block;margin-bottom:4px">Cash Received</label>
          <input id="cashIn" type="number" style="width:100%;padding:12px;border-radius:10px;border:2px solid var(--bd);font-size:22px;font-weight:800;text-align:center;margin-bottom:10px;background:#f8fafc" placeholder="0.00" oninput="updateChange()">
          <div id="changeBox" style="display:none;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;border:2px solid;margin-bottom:12px"></div>
          <button id="completeBtn" class="bigbtn" style="background:#e2e8f0;color:#94a3b8" disabled onclick="var c=Number(document.getElementById('cashIn').value);if(c>=cartTotal())completeSale(c)">✓ Complete Sale</button>
        </div>
      </div>
    </div>`;
  }

  if(showQuickAdd){
    h += `<div class="overlay" onclick="if(event.target===this){showQuickAdd=false;render()}">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="mh"><span style="font-weight:800;font-size:18px">Quick Add Product</span><button onclick="showQuickAdd=false;render()" style="background:none;font-size:18px">✕</button></div>
        <div style="padding:18px">
          <input id="qaName" placeholder="Product name" style="margin-bottom:8px">
          <input id="qaPrice" type="number" placeholder="Price" style="margin-bottom:8px">
          <input id="qaCost" type="number" placeholder="Cost (optional)" style="margin-bottom:8px">
          ${has('inventory') ? `<input id="qaStock" type="number" placeholder="Stock" style="margin-bottom:8px">` : ``}
          <input id="qaCat" placeholder="Category (food, drinks...)" style="margin-bottom:12px">
          <button class="bigbtn" style="background:linear-gradient(135deg,${AC},${PLAN_DARK[PLAN]})" onclick="addProductFromModal()">Add Product</button>
        </div>
      </div>
    </div>`;
  }

  if(upgradeModal){
    const pc = upgradeModal.plan === 'pro' ? '#9333ea' : '#2563eb';
    const pd = upgradeModal.plan === 'pro' ? '#7e22ce' : '#1d4ed8';
    h += `<div class="overlay" onclick="if(event.target===this){upgradeModal=null;render()}">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="mh"><span style="font-weight:800;font-size:18px">🔒 ${upgradeModal.title}</span><button onclick="upgradeModal=null;render()" style="background:none;font-size:18px">✕</button></div>
        <div style="padding:20px">
          <div class="notice" style="margin-bottom:12px">${upgradeModal.msg}</div>
          <div class="card" style="border-color:${pc};background:${upgradeModal.plan==='pro'?'#faf5ff':'#eff6ff'}">
            <div style="font-weight:900;color:${pc};font-size:15px;margin-bottom:4px">${upgradeModal.plan==='pro'?'👑 Pro Plan':'⭐ Business Plan'}</div>
            <div class="small">Available on ${PLAN_NAMES[upgradeModal.plan]}</div>
          </div>
          <a href="index.html#pricing" class="bigbtn" style="background:linear-gradient(135deg,${pc},${pd});margin-bottom:8px">Upgrade Now</a>
          <button class="bigbtn" style="background:#e2e8f0;color:#334155" onclick="upgradeModal=null;render()">Maybe Later</button>
        </div>
      </div>
    </div>`;
  }

  if(receiptSale){
    h += `<div class="overlay" onclick="if(event.target===this){receiptSale=null;render()}">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="mh"><span style="font-weight:800;font-size:18px">Receipt Preview</span><button onclick="receiptSale=null;render()" style="background:none;font-size:18px">✕</button></div>
        <div style="padding:20px">
          <div class="card" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.5">
            <div style="text-align:center;font-weight:900">${settings.storeName}</div>
            <div style="text-align:center;font-size:12px;margin-bottom:10px">${new Date(receiptSale.date).toLocaleString('en-PH')}</div>
            ${receiptSale.items.map(i=>`<div style="display:flex;justify-content:space-between;font-size:13px"><span>${i.name} x${i.qty}</span><span>${peso(i.price*i.qty)}</span></div>`).join('')}
            <hr style="margin:10px 0;border:none;border-top:1px dashed #94a3b8">
            <div style="display:flex;justify-content:space-between;font-size:13px"><span>Subtotal</span><strong>${peso(receiptSale.subtotal || receiptSale.total)}</strong></div>
            ${(receiptSale.discount||0)>0 ? `<div style="display:flex;justify-content:space-between;font-size:13px"><span>Discount</span><strong>- ${peso(receiptSale.discount)}</strong></div>` : ``}
            <div style="display:flex;justify-content:space-between;font-size:14px"><span>Total</span><strong>${peso(receiptSale.total)}</strong></div>
            <div style="display:flex;justify-content:space-between;font-size:13px"><span>Cash</span><span>${peso(receiptSale.cash)}</span></div>
            <div style="display:flex;justify-content:space-between;font-size:13px"><span>Change</span><span>${peso(receiptSale.change)}</span></div>
            <hr style="margin:10px 0;border:none;border-top:1px dashed #94a3b8">
            <div style="text-align:center;font-size:12px">${settings.receiptFooter}</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="bigbtn" style="background:linear-gradient(135deg,${AC},${PLAN_DARK[PLAN]})" onclick="window.print()">Print</button>
            <button class="bigbtn" style="background:#e2e8f0;color:#334155" onclick="receiptSale=null;render()">Close</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML = h;
}

function updateChange(){
  const cash = Number(document.getElementById('cashIn')?.value || 0);
  const total = cartTotal();
  const box = document.getElementById('changeBox');
  const btn = document.getElementById('completeBtn');
  if(!box || !btn) return;
  if(cash>0){
    const ok = cash >= total;
    const diff = Math.abs(cash-total);
    box.style.display='flex';
    box.style.background=ok?'#f0fdf4':'#fef2f2';
    box.style.borderColor=ok?PLAN_COLORS[PLAN]:'#dc2626';
    box.innerHTML=`<span style="color:${ok?'#15803d':'#dc2626'};font-weight:700">${ok?'Change:':'Not enough:'}</span><span style="font-size:24px;font-weight:900;color:${ok?PLAN_COLORS[PLAN]:'#dc2626'}">${peso(diff)}</span>`;
    btn.disabled=!ok;
    btn.style.background=ok?`linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]})`:'#e2e8f0';
    btn.style.color=ok?'#fff':'#94a3b8';
  }else{
    box.style.display='none';
    btn.disabled=true;
    btn.style.background='#e2e8f0';
    btn.style.color='#94a3b8';
  }
}

window.addEventListener('online', ()=>render());
window.addEventListener('offline', ()=>render());
window.addEventListener('keydown', (e)=>{
  if(!has('keyboardShortcuts')) return;
  if(e.key === 'F2'){ e.preventDefault(); screen='pos'; render(); }
  if(e.key === 'F4' && cartCount()>0){ e.preventDefault(); showCheckout=true; render(); }
});

render();
</script>
</body>
</html>
