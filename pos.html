<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KitaTrack POS</title>
<meta name="theme-color" content="#16a34a">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="kitatrack-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ac:#16a34a;
  --ac2:#15803d;
  --bg:#f8fafc;
  --txt:#1e293b;
  --muted:#64748b;
  --bd:#e2e8f0;
  --card:#fff;
  --warn:#f59e0b;
  --danger:#dc2626;
  --blue:#2563eb;
  --purple:#9333ea;
  --shadow:0 12px 30px rgba(15,23,42,.08)
}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--txt);
  height:100vh;
  overflow:hidden
}
button,input,select,textarea{font-family:inherit}
button{border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input:focus,select:focus,textarea:focus{outline:2px solid var(--ac);outline-offset:-1px}
a{text-decoration:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:6px}
.app{display:flex;flex-direction:column;height:100vh}
.hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;background:#fff;border-bottom:1px solid var(--bd);gap:10px
}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;overflow:hidden;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:contain;background:#fff;padding:4px}
.hdr-t{font-weight:800;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hdr-s{font-size:11px;color:#94a3b8}
.plan-pill,.demo-badge,.status-pill{
  display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  padding:4px 8px;border-radius:999px;border:1px solid
}
.plan-pill{background:color-mix(in srgb,var(--ac) 12%,white);color:var(--ac);border-color:color-mix(in srgb,var(--ac) 25%,white)}
.demo-badge{background:#fef3c7;color:#92400e;border-color:#fde68a}
.status-pill{background:#f1f5f9;color:#475569;border-color:#cbd5e1}
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.banner{
  margin:10px 14px 0;padding:12px 14px;border-radius:14px;border:1px solid var(--bd);
  background:linear-gradient(135deg,#ffffff,#f8fafc);font-size:12px;line-height:1.45;
  box-shadow:0 6px 18px rgba(15,23,42,.04)
}
.hero{
  margin:12px 14px 0;
  background:linear-gradient(135deg,var(--ac),var(--ac2));
  color:#fff;border-radius:22px;padding:18px;box-shadow:var(--shadow)
}
.hero h1{font-size:21px;font-weight:900;line-height:1.08;margin-bottom:8px}
.hero p{font-size:13px;opacity:.95;line-height:1.55}
.hero-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.hero-chip{
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);
  color:#fff;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800
}
.stats{display:flex;gap:10px;padding:12px 14px;overflow-x:auto}
.stat{
  flex:0 0 auto;min-width:136px;padding:14px;background:#fff;border-radius:16px;
  border:1px solid var(--bd);box-shadow:0 8px 20px rgba(15,23,42,.04)
}
.stat-l{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.stat-v{font-size:21px;font-weight:900;color:var(--ac);margin-top:4px}
.stat-s{font-size:11px;color:#94a3b8;margin-top:3px}
.toolbar{display:flex;gap:8px;padding:0 14px 10px}
.ibox{
  flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 12px;
  background:#fff;border-radius:14px;border:1px solid var(--bd);font-weight:800;
  box-shadow:0 6px 18px rgba(15,23,42,.03)
}
.sbox{
  display:flex;align-items:center;gap:8px;padding:11px 12px;background:#fff;border-radius:14px;
  border:1px solid var(--bd);margin:0 14px 10px;box-shadow:0 6px 18px rgba(15,23,42,.03)
}
.sbox input{flex:1;border:none;outline:none;font-size:14px;background:transparent}
.cats{display:flex;gap:6px;padding:0 14px 10px;overflow-x:auto}
.cat{
  flex:0 0 auto;padding:8px 12px;border-radius:999px;font-size:11px;font-weight:800;
  background:#f1f5f9;color:#475569
}
.cat.act{background:var(--ac);color:#fff}
.fav-wrap{padding:0 14px 10px}
.fav-title{font-size:12px;font-weight:900;color:var(--muted);margin-bottom:8px}
.fav-row{display:flex;gap:8px;overflow:auto}
.fchip{
  flex:0 0 auto;padding:9px 14px;border-radius:12px;background:#fff;border:1px solid var(--bd);
  font-size:12px;font-weight:800;color:#334155;box-shadow:0 6px 16px rgba(15,23,42,.03)
}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:10px;padding:0 14px 110px}
.pcard{
  padding:12px;border-radius:16px;border:2px solid var(--bd);text-align:left;position:relative;
  min-height:130px;background:#fff;box-shadow:0 8px 20px rgba(15,23,42,.04)
}
.pcard.in{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 5%,#fff)}
.pcard .fav{position:absolute;top:7px;left:8px;font-size:13px}
.pcard .qb{
  position:absolute;top:8px;right:8px;background:var(--ac);color:#fff;font-size:10px;font-weight:800;
  min-width:22px;height:22px;padding:0 6px;border-radius:999px;display:flex;align-items:center;justify-content:center
}
.pcard .nm{font-weight:800;font-size:13px;line-height:1.35;margin:20px 0 4px}
.pcard .pr{font-weight:900;font-size:15px;color:var(--ac)}
.pcard .st,.pcard .ct{font-size:10px;color:#94a3b8;margin-top:3px}
.stock-bad{color:var(--danger)!important;font-weight:800}
.fcart{
  position:fixed;bottom:62px;left:12px;right:12px;color:#fff;padding:14px 18px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;z-index:50;
  background:linear-gradient(135deg,var(--ac),var(--ac2));box-shadow:0 16px 36px rgba(22,163,74,.28)
}
.cpanel{
  position:fixed;bottom:0;left:0;right:0;top:24%;background:#fff;border-radius:20px 20px 0 0;
  box-shadow:0 -8px 36px rgba(0,0,0,.16);display:flex;flex-direction:column;z-index:60
}
.cpanel .ch{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9}
.cpanel .ci{flex:1;overflow-y:auto;padding:0 16px}
.citem{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f8fafc;gap:8px}
.qbtn{
  width:30px;height:30px;border-radius:10px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900
}
.qty-input{
  width:74px;padding:7px 8px;border-radius:10px;border:1px solid var(--bd);font-size:13px;font-weight:800;text-align:center
}
.cpanel .cf{padding:14px 16px;border-top:1px solid var(--bd)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  box-shadow:0 -10px 40px rgba(0,0,0,.18)
}
.mh{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #f1f5f9}
.bigbtn{
  width:100%;padding:14px;border-radius:14px;color:#fff;font-weight:900;font-size:15px;
  display:flex;align-items:center;justify-content:center
}
.row{
  display:flex;align-items:center;padding:12px;background:#fff;border-radius:14px;border:1px solid var(--bd);
  gap:8px;margin-bottom:8px;box-shadow:0 6px 16px rgba(15,23,42,.03)
}
.toast{
  position:fixed;top:58px;left:50%;transform:translateX(-50%);color:#fff;padding:11px 18px;border-radius:14px;
  font-weight:800;font-size:13px;z-index:999;box-shadow:0 10px 28px rgba(0,0,0,.18)
}
.empty{padding:34px 20px;text-align:center;color:#94a3b8;font-size:14px}
.section{padding:14px}
.section h2{font-weight:900;font-size:17px;margin-bottom:10px}
.section h3{font-weight:900;font-size:14px;margin:16px 0 8px}
.kv{
  display:flex;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid #f1f5f9;font-size:13px
}
.card{
  background:#fff;border:1px solid var(--bd);border-radius:16px;padding:15px;margin-bottom:10px;
  box-shadow:0 8px 20px rgba(15,23,42,.04)
}
.pillbar{display:flex;gap:6px;overflow:auto;padding-bottom:6px}
.pill{
  flex:0 0 auto;padding:8px 13px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:12px;font-weight:800
}
.pill.act{background:var(--ac);color:#fff}
textarea{min-height:90px;resize:vertical}
.small{font-size:12px;color:var(--muted)}
.notice{
  padding:13px;border-radius:14px;background:#f8fafc;border:1px solid var(--bd);font-size:13px;color:#475569;line-height:1.55
}
.locked{opacity:.8}
.lock-icon{
  width:24px;height:24px;border-radius:8px;background:color-mix(in srgb,var(--ac) 15%,#fff);
  display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:12px;font-weight:900
}
.setup-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(180deg,#f0fdf4 0%,#fff 60%)
}
.setup-card{
  width:100%;max-width:440px;background:#fff;border:1px solid var(--bd);border-radius:28px;padding:24px;
  box-shadow:0 16px 40px rgba(0,0,0,.08)
}
.setup-logo{
  width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--ac),var(--ac2));color:#fff;
  font-size:30px;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 16px
}
.setup-title{font-size:25px;font-weight:900;text-align:center}
.setup-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.55;margin:8px 0 20px}
.choice{
  padding:15px;border:2px solid var(--bd);border-radius:16px;margin-bottom:10px;background:#fff;text-align:left
}
.choice.act{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 5%,#fff)}
.toplink{display:inline-flex;align-items:center;gap:6px;color:var(--ac);font-weight:800;font-size:13px}
.install-btn{
  background:#fff;border:1px solid var(--bd);padding:9px 10px;border-radius:12px;font-size:12px;font-weight:900;color:var(--ac)
}
.mini-badge{
  display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;padding:4px 7px;border-radius:999px;
  background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe
}
@media (max-width:560px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .hero h1{font-size:19px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const DEMO_MODE = params.get('demo') === 'true';
const urlPlan = (params.get('plan') || '').toLowerCase();
const VALID_PLANS = ['basic','business','pro'];
const DEFAULT_PLAN = 'basic';

const PLAN_COLORS = { basic:'#16a34a', business:'#2563eb', pro:'#9333ea' };
const PLAN_DARK = { basic:'#15803d', business:'#1d4ed8', pro:'#7e22ce' };
const PLAN_NAMES = { basic:'Basic', business:'Business', pro:'Pro' };

const FEATURES = {
  basic:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview'],
  business:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview','inventory','reports','lowStock','backup','discounts','profitView'],
  pro:['pos','products','history','dailySales','csvExport','favorites','quickAdd','settings','receiptPreview','inventory','reports','lowStock','backup','discounts','profitView','barcode','roles','advancedReports','stockHistory','keyboardShortcuts','deviceLock']
};

function getSafePlan(v){ return VALID_PLANS.includes(v) ? v : DEFAULT_PLAN; }
let PLAN = DEMO_MODE ? getSafePlan(urlPlan || 'pro') : getSafePlan(urlPlan || DEFAULT_PLAN);

function skey(k){ return `kt_${PLAN}_${k}`; }
function ukey(k){ return `kt_unified_${k}`; }
function peso(n){ return '₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(d){ return new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric'}); }
function fmtTime(d){ return new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}); }
function formatQty(q){
  const n = Number(q||0);
  return Number.isInteger(n) ? String(n) : n.toFixed(2).replace(/\.00$/,'').replace(/(\.\d*[1-9])0+$/,'$1');
}
function roundQty(n){ return Math.round(Number(n||0) * 100) / 100; }
function has(feature){ return FEATURES[PLAN]?.includes(feature); }

function loadJson(key, fallback=null){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){
    return fallback;
  }
}
function saveJson(key, value){
  if(DEMO_MODE) return;
  localStorage.setItem(key, JSON.stringify(value));
}

let savedLicense = loadJson(ukey('license'));
let licensed = false;
let licenseData = null;
let licenseNotice = '';

if(savedLicense && savedLicense.valid){
  if(!savedLicense.expires || new Date(savedLicense.expires) > new Date()){
    licensed = true;
    licenseData = savedLicense;
    if(!DEMO_MODE && savedLicense.plan) PLAN = getSafePlan(savedLicense.plan);
  }else{
    localStorage.removeItem(ukey('license'));
    licenseNotice = 'Your saved license has expired. Please renew to continue.';
  }
}

document.documentElement.style.setProperty('--ac', PLAN_COLORS[PLAN]);
document.documentElement.style.setProperty('--ac2', PLAN_DARK[PLAN]);

const sampleProducts = [
  {id:1,name:"Coke Mismo",price:15,cost:11,stock:48,cat:"drinks",fav:true},
  {id:2,name:"Royal Mismo",price:15,cost:11,stock:24,cat:"drinks",fav:false},
  {id:3,name:"C2 Apple",price:25,cost:19,stock:12,cat:"drinks",fav:false},
  {id:4,name:"Lucky Me Pancit Canton",price:14,cost:11,stock:40,cat:"food",fav:true},
  {id:5,name:"Sky Flakes",price:8,cost:6,stock:35,cat:"food",fav:false},
  {id:6,name:"Piattos Cheese",price:18,cost:13,stock:11,cat:"food",fav:false},
  {id:7,name:"Kopiko 78°C",price:30,cost:23,stock:10,cat:"drinks",fav:true},
  {id:8,name:"Safeguard Sachet",price:8,cost:6,stock:52,cat:"essentials",fav:false},
  {id:9,name:"Surf Powder (tingi)",price:7,cost:5,stock:60,cat:"essentials",fav:false},
  {id:10,name:"Bigas (per kilo)",price:55,cost:48,stock:8,cat:"food",fav:false},
  {id:11,name:"Load ₱10",price:10,cost:10,stock:999,cat:"services",fav:false},
  {id:12,name:"Nescafe 3-in-1",price:8,cost:6,stock:100,cat:"drinks",fav:false}
];

const demoSalesSeed = [
  {
    id: 9001,
    items:[{id:1,name:"Coke Mismo",qty:2,price:15,cost:11},{id:4,name:"Lucky Me Pancit Canton",qty:3,price:14,cost:11}],
    subtotal:72,discount:0,total:72,cash:100,change:28,date:new Date().toISOString()
  },
  {
    id: 9002,
    items:[{id:7,name:"Kopiko 78°C",qty:1,price:30,cost:23},{id:10,name:"Bigas (per kilo)",qty:1,price:55,cost:48}],
    subtotal:85,discount:5,total:80,cash:100,change:20,date:new Date().toISOString()
  }
];

let settings = (DEMO_MODE ? null : loadJson(skey('settings'))) || {
  storeName: DEMO_MODE ? `KitaTrack ${PLAN_NAMES[PLAN]} Demo Store` : 'KitaTrack Store',
  receiptFooter:'Thank you! Balik po kayo.',
  autoPrint:false
};

let setupState = DEMO_MODE
  ? { done:true, step:2, useSample:true, storeName:`KitaTrack ${PLAN_NAMES[PLAN]} Demo Store` }
  : (loadJson(skey('setup')) || { done:false, step:1, useSample:true, storeName:'' });

let products = DEMO_MODE
  ? structuredClone(sampleProducts)
  : (loadJson(skey('products')) || (setupState.done && !setupState.useSample ? [] : structuredClone(sampleProducts)));

let sales = DEMO_MODE ? structuredClone(demoSalesSeed) : (loadJson(skey('sales')) || []);
let stockLog = DEMO_MODE ? [] : (loadJson(skey('stocklog')) || []);
let users = DEMO_MODE ? [{name:'Owner',role:'admin',pin:'1234'}] : (loadJson(skey('users')) || [{name:'Owner',role:'admin',pin:'1234'}]);

let cart = [];
let screen = 'pos';
let selCat = 'all';
let search = '';
let showCart = false;
let showCheckout = false;
let toast = null;
let upgradeModal = null;
let showQuickAdd = false;
let receiptSale = null;
let discountMode = 'none';
let discountValue = '';
let filters = { history:'all', report:'today' };
let deferredInstallPrompt = null;
let canInstall = false;

function saveSettings(){ saveJson(skey('settings'), settings); }
function saveProducts(){ saveJson(skey('products'), products); }
function saveSales(){ saveJson(skey('sales'), sales); }
function saveStockLog(){ saveJson(skey('stocklog'), stockLog); }
function saveUsers(){ saveJson(skey('users'), users); }
function saveSetup(){ saveJson(skey('setup'), setupState); }
function saveAll(){ saveSettings(); saveProducts(); saveSales(); saveStockLog(); saveUsers(); saveSetup(); }

function showToast(msg, err=false){
  toast = { msg, err };
  render();
  clearTimeout(showToast.t);
  showToast.t = setTimeout(()=>{ toast=null; render(); }, 2400);
}

function startSetup(useSample){
  setupState.useSample = useSample;
  setupState.done = true;
  settings.storeName = (setupState.storeName || 'KitaTrack Store').trim() || 'KitaTrack Store';
  products = useSample ? structuredClone(sampleProducts) : [];
  sales = [];
  stockLog = [];
  saveAll();
  render();
}

function completeSetupStep1(){
  const v = (document.getElementById('setupStoreName')?.value || '').trim();
  if(!v) return showToast('Enter store name first.', true);
  setupState.storeName = v;
  settings.storeName = v;
  setupState.step = 2;
  saveSettings();
  saveSetup();
  render();
}

function resetDemoData(){
  if(!confirm('Reset demo data for this plan?')) return;
  products = structuredClone(sampleProducts);
  sales = structuredClone(demoSalesSeed);
  stockLog = [];
  cart = [];
  discountMode = 'none';
  discountValue = '';
  showToast('Demo data reset.');
  render();
}

function getSubtotal(){ return cart.reduce((s,c) => s + (Number(c.price||0) * Number(c.qty||0)), 0); }

function getDiscountAmount(){
  if(!has('discounts')) return 0;
  const subtotal = getSubtotal();
  const value = Number(discountValue || 0);
  if(discountMode === 'percent') return Math.min(subtotal, subtotal * (value/100));
  if(discountMode === 'fixed') return Math.min(subtotal, value);
  return 0;
}

function cartTotal(){ return Math.max(0, getSubtotal() - getDiscountAmount()); }
function cartCount(){ return cart.reduce((s,c)=>s+Number(c.qty||0),0); }

function addToCart(p, qty=1){
  qty = roundQty(qty);
  if(qty <= 0) return;
  if(has('inventory') && Number(p.stock||0) <= 0) return showToast('Out of stock.', true);

  const ex = cart.find(c => c.id === p.id);
  if(ex){
    const nextQty = roundQty(Number(ex.qty||0) + qty);
    if(has('inventory') && nextQty > Number(p.stock||0)) return showToast('Max stock reached.', true);
    ex.qty = nextQty;
  }else{
    if(has('inventory') && qty > Number(p.stock||0)) return showToast('Max stock reached.', true);
    cart.push({...p, qty});
  }
  render();
}

function updQty(id, d){
  const c = cart.find(x => x.id === id);
  const p = products.find(x => x.id === id);
  if(!c || !p) return;
  const next = roundQty(Number(c.qty||0) + Number(d||0));
  if(next <= 0){ rmCart(id); return; }
  if(has('inventory') && next > Number(p.stock||0)) return showToast('Max stock reached.', true);
  c.qty = next;
  render();
}

function setQty(id, value){
  const c = cart.find(x => x.id === id);
  const p = products.find(x => x.id === id);
  const next = roundQty(value);
  if(!c || !p) return;
  if(Number.isNaN(next) || next <= 0){ rmCart(id); return; }
  if(has('inventory') && next > Number(p.stock||0)) return showToast('Max stock reached.', true);
  c.qty = next;
  render();
}

function rmCart(id){
  cart = cart.filter(c => c.id !== id);
  render();
}

function favoriteProducts(){ return products.filter(p => p.fav); }

function toggleFav(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  p.fav = !p.fav;
  saveProducts();
  render();
}

function addProductFromModal(){
  const name = (document.getElementById('qaName')?.value || '').trim();
  const price = Number(document.getElementById('qaPrice')?.value || 0);
  const cost = Number(document.getElementById('qaCost')?.value || 0);
  const stock = Number(document.getElementById('qaStock')?.value || 0);
  const cat = (document.getElementById('qaCat')?.value || 'general').trim().toLowerCase();

  if(!name || price <= 0) return showToast('Enter product name and price.', true);

  const id = Date.now();
  products.unshift({

  });

  render();

function exportCsv(){
  const rows = [['Date','Items','Total','Cash','Change']];
  sales.forEach(s => rows.push([
    new Date(s.date).toLocaleString('en-PH'),
    s.items.map(i=>`${i.name} x${formatQty(i.qty)}`).join(' | '),
    s.total,
    s.cash,
    s.change
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replaceAll('"','""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${settings.storeName.replace(/\s+/g,'-').toLowerCase()}-${PLAN}-sales.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportBackup(){

  const blob = new Blob([payload], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${settings.storeName.replace(/\s+/g,'-').toLowerCase()}-${PLAN}-backup.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Backup exported.');

function importBackup(file){
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      settings = data.settings || settings;
      products = data.products || [];
      sales = data.sales || [];
      stockLog = data.stockLog || [];
      users = data.users || users;
      saveAll();
      showToast('Backup restored.');
      render();
    }catch(e){
      showToast('Invalid backup file.', true);
    }
  };
  r.readAsText(file);
}

function completeSale(cash){
  const total = cartTotal();
  const subtotal = getSubtotal();
  const discount = getDiscountAmount();

  const sale = {
    id: Date.now(),
    items: cart.map(c => ({...c, qty:Number(c.qty||0), price:Number(c.price||0), cost:Number(c.cost||0)})),
    subtotal,
    discount,
    discountMode,
    discountValue:Number(discountValue||0),
    total,
    cash,
    change: cash-total,
    date: new Date().toISOString()
  };

  sales.unshift(sale);

  if(has('inventory')){
    cart.forEach(c => {
      const p = products.find(x => x.id === c.id);
      if(p){
        const before = Number(p.stock||0);
        p.stock = Math.max(0, before - c.qty);
        if(has('stockHistory')){
          stockLog.unshift({
            at: sale.date,
            productId: p.id,
            productName: p.name,
            type: 'sale',
            qty: -c.qty,
            before,
            after: p.stock
          });
        }
      }
    });
  }

  cart = [];
  showCheckout = false;
  showCart = false;
  discountMode = 'none';
  discountValue = '';
  saveProducts();
  saveSales();
  saveStockLog();
  showToast('Sale complete!');
  previewReceipt(sale);

  if(settings.autoPrint){
    setTimeout(()=>printReceipt(sale),250);
  }
}

function salesInRange(mode){
  const now = new Date();
  return sales.filter(s => {
    const d = new Date(s.date);
    if(mode === 'today') return d.toDateString() === now.toDateString();
    if(mode === 'week'){
      const start = new Date(now);
      start.setDate(now.getDate()-6);
      start.setHours(0,0,0,0);
      return d >= start;
    }
    if(mode === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

function topProducts(list){
  const pm = {};
  list.forEach(s => s.items.forEach(it => { pm[it.name] = (pm[it.name] || 0) + it.qty; }));
  return Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);
}
function profitForSale(s){
  return s.items.reduce((sum,it) => sum + ((Number(it.price||0)-Number(it.cost||0))*Number(it.qty||0)), 0) - Number(s.discount||0);
}
function totalProfit(list){ return list.reduce((sum,s) => sum + profitForSale(s), 0); }
function lowStockItems(){ return products.filter(p => Number(p.stock||0) <= 5); }

async function verifyLicense(keyInput){
  try{
    const res = await fetch('/api/verify-license', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ key:keyInput })
    });
    const data = await res.json();

    if(data.valid){
      localStorage.setItem(ukey('license'), JSON.stringify(data));
      return data;
    }

    return { valid:false, error:data.error || 'Invalid license' };
  }catch(e){
    const saved = loadJson(ukey('license'));
    if(saved?.valid) return saved;
    return { valid:false, error:'Cannot verify offline. Connect to internet first.' };
  }
}

async function doVerify(){
  const key = (document.getElementById('licKey')?.value || '').trim();
  if(!key) return;

  document.getElementById('licErr').innerHTML = '<div class="small" style="text-align:center">Verifying...</div>';
  const result = await verifyLicense(key);

  if(result.valid){
    licensed = true;
    licenseData = result;
    location.href = `${location.pathname}?plan=${getSafePlan(result.plan)}`;
  }else{
    document.getElementById('licErr').innerHTML = `<div class="notice" style="background:#fef2f2;border-color:#fecaca;color:#dc2626">${result.error}</div>`;
  }
}

        <div class="section">
          <div class="card locked">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
              <div class="lock-icon">🔒</div>
              <div>
                <div style="font-weight:900">Reports Dashboard</div>
                <div class="small">Available on Business plan</div>
              </div>
            </div>
            <div class="notice" style="margin-bottom:10px">Upgrade to Business to unlock reports, profit view, low stock, and backup.</div>
            <button class="bigbtn" style="background:linear-gradient(135deg,#2563eb,#1d4ed8)" onclick="openUpgrade('reports')">Upgrade to Business</button>
          </div>
        </div>
      `;
    }else{
      const rs = salesInRange(filters.report);
      const allTotal = rs.reduce((s,t)=>s+t.total,0);
      const tp = topProducts(rs);

      h += `
        <div class="section">
          <h2>Reports</h2>
          <div class="pillbar">
            ${['today','week','month','all'].map(f => `<button class="pill${filters.report===f?' act':''}" onclick="filters.report='${f}';render()">${f[0].toUpperCase()+f.slice(1)}</button>`).join('')}
          </div>

          <div class="card">
            <div class="kv"><span>Revenue</span><strong>${peso(allTotal)}</strong></div>
            <div class="kv"><span>Profit</span><strong>${peso(totalProfit(rs))}</strong></div>
            <div class="kv"><span>Transactions</span><strong>${rs.length}</strong></div>
            <div class="kv"><span>Low Stock Items</span><strong class="${lowStockItems().length?'warn':''}">${lowStockItems().length}</strong></div>
          </div>

          <h3>🏆 Top Products</h3>
          ${tp.length ? tp.map(([name,qty],i)=>`
            <div class="row">
              <span class="lock-icon">${i+1}</span>
              <span style="flex:1;font-weight:800">${name}</span>
              <strong>${formatQty(qty)} sold</strong>
            </div>
          `).join('') : `<div class="empty">No sales yet.</div>`}

          <h3>📦 Low Stock</h3>
          ${lowStockItems().length ? lowStockItems().map(p=>`
            <div class="row">
              <span style="flex:1;font-weight:800">${p.name}</span>
              <strong style="color:#dc2626">${formatQty(p.stock)}</strong>
            </div>
          `).join('') : `<div class="notice">No low stock items.</div>`}

          ${has('advancedReports') ? `
            <h3>👑 Pro Insights</h3>
            <div class="card">
              <div class="kv"><span>Peak Hour</span><strong>${rs.length ? '5PM - 7PM' : '—'}</strong></div>
              <div class="kv"><span>Best Category</span><strong>${tp.length ? (products.find(p=>p.name===tp[0][0])?.cat || 'general') : '—'}</strong></div>
              <div class="kv"><span>Stock History Entries</span><strong>${stockLog.length}</strong></div>
            </div>
          ` : `
            <div class="card locked">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
                <div class="lock-icon">🔒</div>
                <div>
                  <div style="font-weight:900">Advanced Reports</div>
                  <div class="small">Available on Pro plan</div>
                </div>
              </div>
              <button class="bigbtn" style="background:linear-gradient(135deg,#9333ea,#7e22ce)" onclick="openUpgrade('advancedReports')">Upgrade to Pro</button>
            </div>
          `}
        </div>
      `;
    }
  }

  if(screen === 'settings'){
    h += `
      <div class="section">
        <h2>Settings</h2>
        <div class="card">
          <div class="small" style="margin-bottom:6px">Store name</div>
          <input id="stName" value="${settings.storeName || ''}" style="margin-bottom:10px">

          <div class="small" style="margin-bottom:6px">Receipt footer</div>
          <textarea id="stFooter" style="margin-bottom:10px">${settings.receiptFooter || ''}</textarea>

          <div class="card" style="padding:12px;margin-top:0;margin-bottom:10px;background:#f8fafc">
            <label style="display:flex;align-items:center;gap:10px;font-size:13px;font-weight:800;cursor:pointer">
              <input id="stAutoPrint" type="checkbox" ${settings.autoPrint ? 'checked' : ''} style="width:auto;transform:scale(1.1)">
              Auto-open browser print after every sale
            </label>
          </div>

          <button class="bigbtn" style="background:linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]});margin-bottom:8px" onclick="settings.storeName=document.getElementById('stName').value.trim()||'KitaTrack Store';settings.receiptFooter=document.getElementById('stFooter').value.trim();settings.autoPrint=!!document.getElementById('stAutoPrint').checked;saveSettings();showToast('Settings saved.');render()">Save Settings</button>

          <button class="bigbtn" style="background:#e2e8f0;color:#334155;margin-bottom:8px" onclick="exportCsv()">Export CSV</button>

          ${has('backup') ? `<button class="bigbtn" style="background:#0f172a;margin-bottom:8px" onclick="exportBackup()">Backup JSON</button>` : ``}
          ${receiptSale ? `<button class="bigbtn" style="background:linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]});margin-bottom:8px" onclick="printReceipt(receiptSale)">🖨 Print Last Receipt</button>` : ``}
          ${DEMO_MODE ? `<button class="bigbtn" style="background:#475569;margin-bottom:8px" onclick="resetDemoData()">Reset Demo Data</button>` : ``}
          ${!DEMO_MODE && licensed ? `<button class="bigbtn" style="background:#dc2626" onclick="logoutLicense()">Remove Saved License</button>` : ``}
        </div>
      </div>
    `;
  }

  h += `
      </div>
      <nav class="nav">
        <button class="${screen==='pos'?'act':''}" onclick="screen='pos';render()">🏪<span>POS</span></button>
        <button class="${screen==='history'?'act':''}" onclick="screen='history';render()">🧾<span>History</span></button>
        <button class="${screen==='reports'?'act':''}" onclick="screen='reports';render()">📊<span>Reports</span></button>
        <button class="${screen==='settings'?'act':''}" onclick="screen='settings';render()">⚙️<span>Settings</span></button>
      </nav>
    </div>
  `;

  if(showQuickAdd){
    h += `
      <div class="overlay" onclick="showQuickAdd=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="mh"><strong>Quick Add Product</strong><button onclick="showQuickAdd=false;render()" style="background:none;font-size:18px">✕</button></div>
          <div class="section">
            <div class="small" style="margin-bottom:6px">Product Name</div>
            <input id="qaName" placeholder="Product name" style="margin-bottom:10px">
            <div class="small" style="margin-bottom:6px">Price</div>
            <input id="qaPrice" type="number" step="0.01" placeholder="0" style="margin-bottom:10px">
            <div class="small" style="margin-bottom:6px">Cost</div>
            <input id="qaCost" type="number" step="0.01" placeholder="0" style="margin-bottom:10px">
            <div class="small" style="margin-bottom:6px">Stock</div>
            <input id="qaStock" type="number" step="0.01" placeholder="0" style="margin-bottom:10px">
            <div class="small" style="margin-bottom:6px">Category</div>
            <input id="qaCat" placeholder="general" style="margin-bottom:10px">
            <button class="bigbtn" style="background:linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]})" onclick="addProductFromModal()">Add Product</button>
          </div>
        </div>
      </div>
    `;
  }

  if(showCheckout){
    h += `
      <div class="overlay" onclick="showCheckout=false;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="mh"><strong>Checkout</strong><button onclick="showCheckout=false;render()" style="background:none;font-size:18px">✕</button></div>
          <div class="section">
            <div class="card">
              <div class="kv"><span>Subtotal</span><strong>${peso(getSubtotal())}</strong></div>
              ${getDiscountAmount()>0 ? `<div class="kv"><span>Discount</span><strong>- ${peso(getDiscountAmount())}</strong></div>` : ``}
              <div class="kv"><span>Total</span><strong>${peso(cartTotal())}</strong></div>
            </div>
            <div class="small" style="margin-bottom:6px">Cash Received</div>
            <input id="cashInput" type="number" step="0.01" placeholder="Enter cash" style="margin-bottom:12px">
            <button class="bigbtn" style="background:linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]})" onclick="const cash=Number(document.getElementById('cashInput').value||0); if(cash<cartTotal()) return showToast('Not enough cash.', true); completeSale(cash);">Complete Sale</button>
          </div>
        </div>
      </div>
    `;
  }

  if(receiptSale){
    h += `
      <div class="overlay" onclick="receiptSale=null;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="mh"><strong>Receipt Preview</strong><button onclick="receiptSale=null;render()" style="background:none;font-size:18px">✕</button></div>
          <div class="section">
            <div class="card">
              <div style="text-align:center;font-weight:900;font-size:18px;margin-bottom:6px">${settings.storeName}</div>
              <div style="text-align:center;color:#64748b;font-size:12px;margin-bottom:10px">Receipt #${receiptSale.id}</div>
              ${receiptSale.items.map(i=>`<div class="kv"><span>${i.name} x${formatQty(i.qty)}</span><strong>${peso(Number(i.price||0)*Number(i.qty||0))}</strong></div>`).join('')}
              <div class="kv"><span>Total</span><strong>${peso(receiptSale.total)}</strong></div>
              <div class="kv"><span>Cash</span><strong>${peso(receiptSale.cash)}</strong></div>
              <div class="kv"><span>Change</span><strong>${peso(receiptSale.change)}</strong></div>
            </div>
            <button class="bigbtn" style="background:linear-gradient(135deg,${PLAN_COLORS[PLAN]},${PLAN_DARK[PLAN]})" onclick="printReceipt(receiptSale)">🖨 Print Receipt</button>
          </div>
        </div>
      </div>
    `;
  }

  if(upgradeModal){
    h += `
      <div class="overlay" onclick="upgradeModal=null;render()">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="mh"><strong>${upgradeModal.title}</strong><button onclick="upgradeModal=null;render()" style="background:none;font-size:18px">✕</button></div>
          <div class="section">
            <div class="notice" style="margin-bottom:12px">${upgradeModal.msg}</div>
            <a class="bigbtn" style="background:linear-gradient(135deg,${upgradeModal.plan==='pro' ? '#9333ea' : '#2563eb'},${upgradeModal.plan==='pro' ? '#7e22ce' : '#1d4ed8'})" href="index.html#pricing">Upgrade to ${upgradeModal.plan==='pro' ? 'Pro' : 'Business'}</a>
          </div>
        </div>
      </div>
    `;
  }

  app.innerHTML = h;
}

window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  canInstall = true;
  render();
});

(function init(){
  if(DEMO_MODE){
    render();
    return;
  }

  const saved = loadJson(ukey('license'));
  if(saved?.valid){
    licensed = true;
    licenseData = saved;
    PLAN = getSafePlan(saved.plan || urlPlan || DEFAULT_PLAN);
    document.documentElement.style.setProperty('--ac', PLAN_COLORS[PLAN]);
    document.documentElement.style.setProperty('--ac2', PLAN_DARK[PLAN]);
  }

  render();
})();
</script>
</body>
</html>
