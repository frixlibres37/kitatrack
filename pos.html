<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitaTrack POS</title>

<style>
body { font-family: Arial; margin:0; background:#f1f5f9 }
.container { max-width:1000px; margin:auto; padding:20px }

.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:10px }
button { padding:10px; border:none; border-radius:8px; cursor:pointer }
.btn { background:#2563eb; color:#fff }
.btn-g { background:#16a34a; color:#fff }
.btn-r { background:#dc2626; color:#fff }

input { padding:10px; width:100%; margin:5px 0; border-radius:8px; border:1px solid #ccc }

.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px }
.product { padding:10px; background:#e2e8f0; border-radius:8px; cursor:pointer }

.cart-item { display:flex; justify-content:space-between; margin:5px 0 }

.topbar { display:flex; justify-content:space-between; margin-bottom:10px }
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginCard" class="card">
    <h3>Enter License Key</h3>
    <input id="licenseKey" placeholder="XXXX-XXXX-XXXX-XXXX">
    <button class="btn" onclick="activate()">Activate</button>
    <button class="btn" onclick="useDemo()">Use Demo</button>
    <p id="loginMsg"></p>
  </div>

  <!-- POS -->
  <div id="posApp" style="display:none">

    <div class="topbar">
      <h3>KitaTrack POS</h3>
      <button class="btn-r" onclick="logout()">Logout</button>
    </div>

    <!-- PRODUCTS -->
    <div class="card">
      <h4>Add Product</h4>
      <input id="pName" placeholder="Product name">
      <input id="pPrice" placeholder="Price" type="number">
      <button class="btn-g" onclick="addProduct()">Add</button>
    </div>

    <div class="card">
      <h4>Products</h4>
      <div id="products" class="grid"></div>
    </div>

    <!-- CART -->
    <div class="card">
      <h4>Cart</h4>
      <div id="cart"></div>
      <h3>Total: ₱<span id="total">0</span></h3>

      <input id="cash" placeholder="Cash">
      <button class="btn" onclick="checkout()">Checkout</button>
    </div>

    <!-- HISTORY -->
    <div class="card">
      <h4>Sales History</h4>
      <div id="history"></div>
    </div>

  </div>

</div>

<script>
const DEMO = location.pathname.includes("demo.html");

function key(k){ return "kt_" + k }

// ---------------------- LICENSE ----------------------

async function verifyLicense(keyInput){
  try{
    const res = await fetch('/api/verify-license',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ key:keyInput })
    });

    const data = await res.json();

    if(data.valid){
      localStorage.setItem(key('license'), JSON.stringify(data));
      return true;
    }

    return false;

  }catch(e){
    // offline fallback
    const saved = JSON.parse(localStorage.getItem(key('license')) || "null");
    return saved?.valid;
  }
}

async function activate(){
  const keyInput = document.getElementById('licenseKey').value;
  const ok = await verifyLicense(keyInput);

  if(ok){
    startPOS();
  }else{
    document.getElementById('loginMsg').innerText = "Invalid license";
  }
}

function useDemo(){
  if(!DEMO){
    location.href = "demo.html";
    return;
  }
  startPOS();
}

function logout(){
  localStorage.removeItem(key('license'));
  location.reload();
}

// ---------------------- POS ----------------------

let products = JSON.parse(localStorage.getItem(key('products')) || "[]");
let cart = [];

function startPOS(){
  document.getElementById('loginCard').style.display = "none";
  document.getElementById('posApp').style.display = "block";

  renderProducts();
  renderHistory();
}

function addProduct(){
  const name = document.getElementById('pName').value;
  const price = Number(document.getElementById('pPrice').value);

  if(!name || !price) return alert("Fill fields");

  products.push({name, price});
  localStorage.setItem(key('products'), JSON.stringify(products));

  renderProducts();
}

function renderProducts(){
  const el = document.getElementById('products');
  el.innerHTML = "";

  products.forEach((p,i)=>{
    const d = document.createElement('div');
    d.className = "product";
    d.innerText = p.name + "\n₱" + p.price;

    d.onclick = ()=>{
      cart.push(p);
      renderCart();
    }

    el.appendChild(d);
  });
}

// ---------------------- CART ----------------------

function renderCart(){
  const el = document.getElementById('cart');
  el.innerHTML = "";

  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;

    const div = document.createElement('div');
    div.className = "cart-item";
    div.innerHTML = `
      ${c.name} - ₱${c.price}
      <button onclick="removeItem(${i})">x</button>
    `;
    el.appendChild(div);
  });

  document.getElementById('total').innerText = total;
}

function removeItem(i){
  cart.splice(i,1);
  renderCart();
}

// ---------------------- CHECKOUT ----------------------

function checkout(){
  const total = Number(document.getElementById('total').innerText);
  const cash = Number(document.getElementById('cash').value);

  if(cash < total) return alert("Not enough cash");

  const change = cash - total;

  const sale = {
    items: cart,
    total,
    cash,
    change,
    date: new Date().toISOString()
  };

  let history = JSON.parse(localStorage.getItem(key('sales')) || "[]");
  history.push(sale);
  localStorage.setItem(key('sales'), JSON.stringify(history));

  alert("Change: ₱" + change);

  cart = [];
  renderCart();
  renderHistory();
}

// ---------------------- HISTORY ----------------------

function renderHistory(){
  const el = document.getElementById('history');
  el.innerHTML = "";

  const history = JSON.parse(localStorage.getItem(key('sales')) || "[]");

  history.forEach(h=>{
    const div = document.createElement('div');
    div.innerHTML = `
      <p>₱${h.total} - ${new Date(h.date).toLocaleString()}</p>
    `;
    el.appendChild(div);
  });
}

// ---------------------- AUTO LOGIN ----------------------

(function init(){
  if(DEMO){
    startPOS();
    return;
  }

  const saved = JSON.parse(localStorage.getItem(key('license')) || "null");

  if(saved?.valid){
    startPOS();
  }
})();
</script>

</body>
</html>
