<script>
const ADMIN_API = '/api/admin';
const EMAILJS_PUBLIC_KEY='tQmEhBYzAZAM9KcRK';
const EMAILJS_SERVICE_ID='Service_tv56duv';
const EMAILJS_PENDING_TEMPLATE_ID='template_3oqrd3m';
const EMAILJS_VERIFIED_TEMPLATE_ID='template_xxxxxxx';
const APP_LOGO_URL='https://kitatrack.vercel.app/kitatrack-logo.png';
if(window.emailjs){ emailjs.init({publicKey: EMAILJS_PUBLIC_KEY}); }

const DEFAULT_SETTINGS={
  publicAppUrl:'https://kitatrack.vercel.app/pos.html',
  businessName:'KitaTrack POS',
  supportName:'KitaTrack POS Team',
  supportPhone:'',
  adminPin:'0715'
};

function loadSettings(){
  try{return {...DEFAULT_SETTINGS,...(JSON.parse(localStorage.getItem('kt_admin_settings')||'{}'))};}
  catch(e){return {...DEFAULT_SETTINGS};}
}
function saveSettings(next){localStorage.setItem('kt_admin_settings',JSON.stringify(next));}
let settings=loadSettings();

const peso=n=>'₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2});
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}):'—';
const fmtTime=d=>d?new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}):'';
const fmtDT=d=>d?`${fmtDate(d)} ${fmtTime(d)}`:'—';
function slugPlan(plan){return ['basic','business','pro','custom'].includes(plan)?plan:'basic';}
function escapeHtml(str=''){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function genKey(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let key='';for(let i=0;i<16;i++){key+=chars[Math.floor(Math.random()*chars.length)];if(i===3||i===7||i===11)key+='-';}return key;}
function calcExpiry(period){if(period==='lifetime')return null;const now=new Date();if(period==='daily')now.setDate(now.getDate()+1);else if(period==='monthly')now.setMonth(now.getMonth()+1);else if(period==='trial')now.setDate(now.getDate()+7);return now.toISOString();}
function calcAmount(plan,period){
  const prices={
    basic:{daily:15,monthly:299,lifetime:1999,trial:0},
    business:{daily:25,monthly:499,lifetime:3499,trial:0},
    pro:{daily:40,monthly:799,lifetime:5499,trial:0},
    custom:{daily:40,monthly:799,lifetime:5499,trial:0}
  };
  return prices[slugPlan(plan)]?.[period]??0;
}
function statusDot(s){const colors={active:'var(--g)',pending:'var(--y)',expired:'var(--r)',suspended:'var(--gr)',completed:'#0f766e',rejected:'var(--r)',verified:'#0f766e'};return `<div class="li-dot" style="background:${colors[s]||'var(--gr)'}"></div>`;}
function statusBadge(s){const cls={active:'st-active',pending:'st-pending',expired:'st-expired',suspended:'st-suspended',completed:'st-completed',verified:'st-completed',rejected:'st-expired'};return `<span class="li-status ${cls[s]||'st-suspended'}">${escapeHtml(s||'unknown')}</span>`;}
function isExpired(license){return license.expires_at&&new Date(license.expires_at)<new Date();}
function effectiveStatus(license){if(license.status==='active'&&isExpired(license))return 'expired';return license.status||'pending';}
function publicLinkForLicense(lic){return `${settings.publicAppUrl}?plan=${slugPlan(lic.plan)}`;}
function publicDemoLink(plan){return `${settings.publicAppUrl}?plan=${slugPlan(plan)}&demo=true`;}
function genMessage(lic){
  return `Hi ${lic.customer_name}! 👋\n\nYour ${settings.businessName} is now activated ✅\n\n🔑 License Key:\n${lic.license_key}\n\n📦 Plan: ${(lic.plan||'').charAt(0).toUpperCase()+(lic.plan||'').slice(1)}\n📅 ${lic.period==='lifetime'?'Lifetime (never expires)':'Valid until: '+fmtDate(lic.expires_at)}\n\n👉 Open the app:\n${settings.publicAppUrl}\n\nEnter your key to start.\n\n${settings.supportPhone?'📞 Support: '+settings.supportPhone+'\n\n':''}Salamat! 🙏\n— ${settings.supportName}`;
}
function toast(msg,err=false){
  const el=document.getElementById('toastEl');
  el.className='toast'+(err?' err':'');
  el.textContent=msg;
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'),2600);
}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('Copied!');}catch{toast('Copy failed',true);}}

let currentPage='dashboard',licenses=[],payments=[],orders=[],searchQ='',filterStatus='all',filterPlan='all',filterOrders='pending';
let pinValue='';

function getAdminPin(){return loadSettings().adminPin||'0715';}
function adminHeaders(extra={}){
  return {
    'Content-Type':'application/json',
    'x-admin-pin': getAdminPin(),
    ...extra
  };
}

async function apiGet(mode){
  const r=await fetch(`${ADMIN_API}?mode=${encodeURIComponent(mode)}`,{
    headers: adminHeaders()
  });
  const data=await r.json().catch(()=>null);
  if(!r.ok) throw new Error(data?.error || `GET ${mode} failed`);
  return data;
}
async function apiPost(body){
  const r=await fetch(ADMIN_API,{
    method:'POST',
    headers: adminHeaders(),
    body: JSON.stringify(body)
  });
  const data=await r.json().catch(()=>null);
  if(!r.ok) throw new Error(data?.error || 'Request failed');
  return data;
}

function pinAdd(d){
  if(pinValue.length>=4)return;
  pinValue+=d;
  document.getElementById('pinErr').textContent='';
  document.querySelectorAll('.p-dot').forEach((dot,i)=>dot.style.background=i<pinValue.length?'#16a34a':'#e2e8f0');
  if(pinValue.length===4){
    setTimeout(()=>{
      if(pinValue===getAdminPin()){
        unlockAdmin();
      }else{
        document.getElementById('pinErr').textContent='Wrong PIN. Try again.';
        pinValue='';
        document.querySelectorAll('.p-dot').forEach(dot=>dot.style.background='#dc2626');
        setTimeout(()=>document.querySelectorAll('.p-dot').forEach(dot=>dot.style.background='#e2e8f0'),500);
      }
    },180);
  }
}
function pinDel(){
  pinValue=pinValue.slice(0,-1);
  document.querySelectorAll('.p-dot').forEach((dot,i)=>dot.style.background=i<pinValue.length?'#16a34a':'#e2e8f0');
}
function unlockAdmin(){
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('mainHeader').classList.remove('hidden');
  document.getElementById('mainNav').classList.remove('hidden');
  sessionStorage.setItem('kt_admin_auth','true');
}
function logoutAdmin(){sessionStorage.removeItem('kt_admin_auth');location.reload();}
document.addEventListener('keydown',e=>{
  if(document.getElementById('pinScreen').classList.contains('hidden'))return;
  if(e.key>='0'&&e.key<='9')pinAdd(e.key);
  if(e.key==='Backspace')pinDel();
});

function updateOnlineStatus(){
  const dot=document.getElementById('onlineStatus');
  const text=document.getElementById('onlineText');
  if(navigator.onLine){dot.className='online-dot';text.textContent='Online';}
  else{dot.className='online-dot offline-dot';text.textContent='Offline';}
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);

async function loadData(showMessage=false){
  try{
    const [licRes, payRes, ordRes] = await Promise.all([
      apiGet('licenses'),
      apiGet('payments'),
      apiGet('orders')
    ]);
    licenses = licRes.licenses || [];
    payments = payRes.payments || [];
    orders = ordRes.orders || [];
    syncExpiredLocally();
    if(showMessage) toast('Data refreshed');
  }catch(e){
    console.error(e);
    toast(e.message || 'Failed to load data', true);
  }
  render();
}
function syncExpiredLocally(){licenses=licenses.map(l=>effectiveStatus(l)==='expired'?{...l,status:'expired'}:l);}

function go(page){
  currentPage=page;searchQ='';filterStatus='all';filterPlan='all';
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('act'));
  const navBtn=document.getElementById('nav-'+page); if(navBtn) navBtn.classList.add('act');
  document.getElementById('hdrSub').textContent={dashboard:'Dashboard',orders:'Pending Orders',create:'Create License',licenses:'Licenses',payments:'Payments'}[page]||'';
  render();
}

async function sendPendingEmail(order){
  if(!window.emailjs) return {ok:false,error:'EmailJS SDK not loaded'};
  if(!order?.email && !order?.customer_email) return {ok:false,error:'Customer email missing'};
  try{
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_PENDING_TEMPLATE_ID, {
      to_email: order.email || order.customer_email,
      customer_name: order.name || order.customer_name || 'Customer',
      plan_name: (order.plan || '').charAt(0).toUpperCase() + (order.plan || '').slice(1),
      period: order.period || '',
      amount: peso(order.amount || 0),
      payment_method: order.payment_method || order.method || '',
      logo_url: APP_LOGO_URL
    });
    return {ok:true};
  }catch(e){console.error(e);return {ok:false,error:String(e)};}
}
async function sendVerifiedEmail(lic){
  if(!window.emailjs) return {ok:false,error:'EmailJS SDK not loaded'};
  if(EMAILJS_VERIFIED_TEMPLATE_ID==='template_xxxxxxx') return {ok:false,error:'Paste your verified EmailJS template ID first'};
  if(!lic?.customer_email) return {ok:false,error:'Customer email missing'};
  try{
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_VERIFIED_TEMPLATE_ID, {
      to_email: lic.customer_email,
      customer_name: lic.customer_name || 'Customer',
      plan_name: (lic.plan || '').charAt(0).toUpperCase() + (lic.plan || '').slice(1),
      period: lic.period || '',
      license_key: lic.license_key || '',
      app_link: publicLinkForLicense(lic),
      logo_url: APP_LOGO_URL
    });
    return {ok:true};
  }catch(e){console.error(e);return {ok:false,error:String(e)};}
}

function render(){
  const app=document.getElementById('app');
  if(currentPage==='dashboard') app.innerHTML=renderDashboard();
  else if(currentPage==='orders') app.innerHTML=renderOrders();
  else if(currentPage==='create') app.innerHTML=renderCreate();
  else if(currentPage==='licenses') app.innerHTML=renderLicenses();
  else if(currentPage==='payments') app.innerHTML=renderPayments();
}

function renderDashboard(){
  const active=licenses.filter(l=>effectiveStatus(l)==='active').length;
  const pendingOrders=orders.filter(o=>(o.status||'pending')==='pending').length;
  const totalRevenue=licenses.reduce((s,l)=>s+Number(l.amount||0),0);
  const totalOrders=orders.length;
  let h=`<div class="page">
    <div class="kpi-grid">
      <div class="card stat-green"><div class="card-t">Active Licenses</div><div class="card-v">${active}</div><div class="card-sub">${licenses.length} total licenses</div></div>
      <div class="card stat-purple"><div class="card-t">Pending Orders</div><div class="card-v">${pendingOrders}</div><div class="card-sub">${totalOrders} total orders</div></div>
      <div class="card stat-blue"><div class="card-t">Revenue</div><div class="card-v">${peso(totalRevenue)}</div><div class="card-sub">${payments.length} payment records</div></div>
      <div class="card stat-red"><div class="card-t">Expired</div><div class="card-v">${licenses.filter(l=>effectiveStatus(l)==='expired').length}</div><div class="card-sub">Need renewal</div></div>
    </div>

    <div class="quick-grid">
      <div class="quick-card"><h4>🧾 Pending Orders</h4><p>Review payment submissions, screenshots, and references.</p><button class="btn btn-y btn-sm btn-full" style="margin-top:10px" onclick="go('orders')">Open Orders</button></div>
      <div class="quick-card"><h4>➕ Create Cash License</h4><p>Create and send a key instantly for walk-in customers.</p><button class="btn btn-g btn-sm btn-full" style="margin-top:10px" onclick="go('create')">Create Now</button></div>
      <div class="quick-card"><h4>🎮 Demo Links</h4><p>Copy test links for Basic, Business, and Pro.</p><button class="btn btn-o btn-sm btn-full" style="margin-top:10px" onclick="showDemoLinks()">Open</button></div>
      <div class="quick-card"><h4>💳 Payment QR</h4><p>Show GCash and Maya QR codes for customers ready to pay.</p><button class="btn btn-b btn-sm btn-full" style="margin-top:10px" onclick="showPaymentQR()">Show QR</button></div>
    </div>`;
  if(pendingOrders){
    h += `<div class="sec-header" style="margin-top:16px"><div class="sec-title">Latest Pending Orders</div><button class="btn btn-o btn-sm" onclick="go('orders')">View All</button></div>`;
    orders.filter(o=>(o.status||'pending')==='pending').slice(0,5).forEach(o=>{
      h += `<div class="list-item" onclick="showOrderDetail('${o.id}')">${statusDot('pending')}<div class="li-info"><div class="li-name">${escapeHtml(o.name||'Unknown')}</div><div class="li-sub">${escapeHtml((o.plan||'').toUpperCase())} · ${escapeHtml(o.period||'')} · ${escapeHtml(o.reference_number||'No ref')}</div></div><div class="li-right"><div class="li-amount">${peso(o.amount)}</div>${statusBadge(o.status||'pending')}</div></div>`;
    });
  }
  h += `</div>`;
  return h;
}

function renderOrders(){
  let filtered=[...orders];
  if(filterOrders!=='all') filtered=filtered.filter(o=>(o.status||'pending')===filterOrders);
  if(searchQ){
    const q=searchQ.toLowerCase();
    filtered=filtered.filter(o=>(o.name||'').toLowerCase().includes(q)||(o.email||'').toLowerCase().includes(q)||(o.reference_number||'').toLowerCase().includes(q)||(o.plan||'').toLowerCase().includes(q));
  }
  let h=`<div class="page">
    <div class="sec-header"><div class="sec-title">Orders</div><button class="btn btn-o btn-sm" onclick="loadData(true)">Refresh</button></div>
    <div class="search-box"><span>🔍</span><input placeholder="Search name, email, reference..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div>
    <div class="pills">
      <button class="pill${filterOrders==='pending'?' act':''}" onclick="filterOrders='pending';render()">Pending</button>
      <button class="pill${filterOrders==='verified'?' act':''}" onclick="filterOrders='verified';render()">Verified</button>
      <button class="pill${filterOrders==='completed'?' act':''}" onclick="filterOrders='completed';render()">Completed</button>
      <button class="pill${filterOrders==='rejected'?' act':''}" onclick="filterOrders='rejected';render()">Rejected</button>
      <button class="pill${filterOrders==='all'?' act':''}" onclick="filterOrders='all';render()">All</button>
    </div>`;
  if(!filtered.length){
    h += `<div class="empty"><div class="ic">🧾</div>No orders found.</div>`;
  }else{
    filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(o=>{
      h += `<div class="list-item" onclick="showOrderDetail('${o.id}')">${statusDot(o.status||'pending')}<div class="li-info"><div class="li-name">${escapeHtml(o.name||'Unknown')}</div><div class="li-sub">${escapeHtml((o.plan||'').toUpperCase())} · ${escapeHtml(o.period||'')} · ${escapeHtml(o.reference_number||'No ref')}</div></div><div class="li-right"><div class="li-amount">${peso(o.amount)}</div>${statusBadge(o.status||'pending')}</div></div>`;
    });
  }
  h += `</div>`;
  return h;
}

function renderCreate(){
  return `<div class="page">
    <div class="card">
      <h3 style="font-weight:800;font-size:16px;margin-bottom:16px">➕ Create New License</h3>
      <div class="form-group"><label class="form-label">Customer Name *</label><input id="cName" placeholder="Juan Dela Cruz"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input id="cEmail" type="email" placeholder="Optional"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="cPhone" placeholder="09XX XXX XXXX"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Plan *</label><select id="cPlan" onchange="updateAmount()"><option value="basic">Basic</option><option value="business">Business</option><option value="pro">Pro</option><option value="custom">Custom</option></select></div>
        <div class="form-group"><label class="form-label">Period *</label><select id="cPeriod" onchange="updateAmount()"><option value="daily">Daily</option><option value="monthly">Monthly</option><option value="lifetime">Lifetime</option><option value="trial">Trial (7 days)</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Payment Method</label><select id="cMethod"><option value="cash">Cash</option><option value="gcash">GCash</option><option value="maya">Maya</option><option value="free">Free Trial</option></select></div>
        <div class="form-group"><label class="form-label">Amount (₱)</label><input id="cAmount" type="number" value="15"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea id="cNotes" rows="2" placeholder="Optional notes..."></textarea></div>
      <button class="btn btn-g btn-full" onclick="createLicense()">🔑 Create & Activate License</button>
    </div>
  </div>`;
}
function updateAmount(){
  const plan=document.getElementById('cPlan').value;
  const period=document.getElementById('cPeriod').value;
  document.getElementById('cAmount').value=calcAmount(plan,period);
}
async function createLicense(){
  const name=document.getElementById('cName').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const plan=document.getElementById('cPlan').value;
  const period=document.getElementById('cPeriod').value;
  const method=document.getElementById('cMethod').value;
  const amount=Number(document.getElementById('cAmount').value||0);
  const notes=document.getElementById('cNotes').value.trim();

  if(!name) return toast('Please enter customer name',true);
  if(period==='trial' && plan!=='basic') return toast('Trial is only for Basic plan', true);

  try{
    const result = await apiPost({
      action:'create_license',
      customer_name:name,
      customer_email:email || null,
      customer_phone:phone || null,
      plan,
      period,
      payment_method:method,
      amount,
      notes:notes || null
    });

    const lic = result.license;
    if(!lic) return toast('Failed to create license', true);

    licenses.unshift(lic);

    if(amount>0){
      try{
        const payResult = await apiPost({
          action:'record_payment',
          license_id: lic.id,
          amount: amount,
          method: method,
          reference_number: null
        });
        if(payResult.payment) payments.unshift(payResult.payment);
      }catch(e){
        console.error(e);
      }
    }

    const emailRes=await sendVerifiedEmail(lic);
    showSuccessModal(lic);
    toast(emailRes.ok?'License created + email sent!':'License created. Email not sent.', !emailRes.ok);
    render();
  }catch(e){
    console.error(e);
    toast(e.message || 'Failed to create license', true);
  }
}

function renderLicenses(){
  let filtered=[...licenses];
  if(filterStatus!=='all') filtered=filtered.filter(l=>effectiveStatus(l)===filterStatus);
  if(filterPlan!=='all') filtered=filtered.filter(l=>slugPlan(l.plan)===filterPlan);
  if(searchQ){
    const q=searchQ.toLowerCase();
    filtered=filtered.filter(l=>(l.customer_name||'').toLowerCase().includes(q)||(l.license_key||'').toLowerCase().includes(q)||(l.customer_email||'').toLowerCase().includes(q));
  }
  let h=`<div class="page"><div class="search-box"><span>🔍</span><input placeholder="Search name, key, email..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div>
  <div class="pills"><button class="pill${filterStatus==='all'?' act':''}" onclick="filterStatus='all';render()">All</button><button class="pill${filterStatus==='active'?' act':''}" onclick="filterStatus='active';render()">Active</button><button class="pill${filterStatus==='expired'?' act':''}" onclick="filterStatus='expired';render()">Expired</button><button class="pill${filterStatus==='suspended'?' act':''}" onclick="filterStatus='suspended';render()">Suspended</button></div>
  <div class="pills"><button class="pill${filterPlan==='all'?' act':''}" onclick="filterPlan='all';render()">All Plans</button><button class="pill${filterPlan==='basic'?' act':''}" onclick="filterPlan='basic';render()">Basic</button><button class="pill${filterPlan==='business'?' act':''}" onclick="filterPlan='business';render()">Business</button><button class="pill${filterPlan==='pro'?' act':''}" onclick="filterPlan='pro';render()">Pro</button></div>`;
  if(!filtered.length) h += `<div class="empty"><div class="ic">🔑</div>No licenses found.</div>`;
  else filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(l=>{h += `<div class="list-item" onclick="showLicenseDetail('${l.id}')">${statusDot(effectiveStatus(l))}<div class="li-info"><div class="li-name">${escapeHtml(l.customer_name||'Unknown')}</div><div class="li-sub">${escapeHtml(l.license_key||'—')}</div></div><div class="li-right"><div class="li-amount">${peso(l.amount)}</div>${statusBadge(effectiveStatus(l))}</div></div>`;});
  h += `</div>`; return h;
}

function renderPayments(){
  let filtered=[...payments];
  if(searchQ){const q=searchQ.toLowerCase();filtered=filtered.filter(p=>{const lic=licenses.find(l=>l.id===p.license_id);return (lic?.customer_name||'').toLowerCase().includes(q)||(p.method||'').toLowerCase().includes(q)||(p.reference_number||'').toLowerCase().includes(q);});}
  let h=`<div class="page"><div class="search-box"><span>🔍</span><input placeholder="Search customer, method, ref..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div>`;
  if(!filtered.length) h += `<div class="empty"><div class="ic">💰</div>No payments recorded yet.</div>`;
  else filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(p=>{const lic=licenses.find(l=>l.id===p.license_id);h += `<div class="list-item">${statusDot(p.verified?'active':'pending')}<div class="li-info"><div class="li-name">${escapeHtml(lic?.customer_name||'Unknown')}</div><div class="li-sub">${escapeHtml(p.method||'—')} · ${escapeHtml(p.reference_number||'No ref')} · ${fmtDate(p.created_at)}</div></div><div class="li-right"><div class="li-amount">${peso(p.amount)}</div>${p.verified?'<span class="li-status st-active">Verified</span>':'<span class="li-status st-pending">Pending</span>'}</div></div>`;});
  h += `</div>`; return h;
}

function closeModal(){document.getElementById('modalEl').innerHTML='';}

function showSuccessModal(lic){
  const msg=genMessage(lic);
  document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>License Created! 🎉</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="success-card"><div class="success-icon">✓</div><h3 style="font-size:18px;font-weight:800;margin-bottom:4px">${escapeHtml(lic.customer_name)}</h3><p style="color:var(--gr);font-size:14px">${escapeHtml((lic.plan||'').charAt(0).toUpperCase()+(lic.plan||'').slice(1))} · ${escapeHtml(lic.period)}</p><div class="key-display">${escapeHtml(lic.license_key)}</div></div><div class="action-btns"><button class="btn btn-g btn-full" onclick="copyText('${escapeHtml(lic.license_key)}')">📋 Copy License Key</button><button class="btn btn-o btn-full" onclick='copyText(${JSON.stringify(msg)})'>💬 Copy Full Message</button><button class="btn btn-b btn-full" onclick='copyText(${JSON.stringify(publicLinkForLicense(lic))})'>🔗 Copy App Link</button></div></div></div></div>`;
}

function showLicenseDetail(id){
  const l=licenses.find(x=>x.id===id); if(!l) return;
  const msg=genMessage(l);
  document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>License Details</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="detail-section"><div class="detail-row"><span>Customer</span><strong>${escapeHtml(l.customer_name||'Unknown')}</strong></div><div class="detail-row"><span>Key</span><strong style="font-family:monospace;color:var(--g)">${escapeHtml(l.license_key||'—')}</strong></div><div class="detail-row"><span>Plan</span><strong>${escapeHtml((l.plan||'').toUpperCase())}</strong></div><div class="detail-row"><span>Email</span><strong>${escapeHtml(l.customer_email||'—')}</strong></div><div class="detail-row"><span>Status</span>${statusBadge(effectiveStatus(l))}</div></div><div class="action-btns"><button class="btn btn-g btn-full" onclick="copyText('${escapeHtml(l.license_key)}')">📋 Copy Key</button><button class="btn btn-o btn-full" onclick='copyText(${JSON.stringify(msg)})'>💬 Copy Message</button><button class="btn btn-b btn-full" onclick='copyText(${JSON.stringify(publicLinkForLicense(l))})'>🔗 Copy App Link</button><button class="btn btn-y btn-full" onclick="resendVerifiedEmail('${l.id}')">✉️ Send License Email</button></div></div></div></div>`;
}
