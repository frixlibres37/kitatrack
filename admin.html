<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KitaTrack Admin</title>
<meta name="theme-color" content="#16a34a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#16a34a;--gd:#15803d;--gl:#f0fdf4;--s:#1e293b;--gr:#64748b;--lt:#f8fafc;--wh:#fff;--bd:#e2e8f0;--r:#dc2626;--b:#2563eb;--p:#9333ea;--y:#f59e0b;--shadow:0 10px 30px rgba(15,23,42,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--lt);color:var(--s);min-height:100vh;padding-bottom:76px}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;width:100%;padding:11px 12px;border-radius:12px;border:1.5px solid var(--bd);font-size:14px;background:var(--wh)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--g);outline-offset:-1px}
textarea{resize:vertical}a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}.hidden{display:none!important}
.hdr{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr-l{display:flex;align-items:center;gap:9px}.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.hdr-t{font-weight:800;font-size:16px;color:var(--g)}.hdr-s{font-size:10px;color:var(--gr)}.hdr-r{display:flex;align-items:center;gap:10px}.status-chip{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gr);font-weight:600}.online-dot{width:8px;height:8px;border-radius:50%;background:var(--g)}.offline-dot{background:var(--r)}
.icon-btn{background:#fff;border:1px solid var(--bd);padding:8px 10px;border-radius:10px;font-size:16px;box-shadow:var(--shadow)}
.page{padding:16px}.card{background:var(--wh);border-radius:16px;border:1px solid var(--bd);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}.card-t{font-size:11px;color:var(--gr);font-weight:700;text-transform:uppercase;letter-spacing:.6px}.card-v{font-size:24px;font-weight:800;margin-top:2px}.card-sub{font-size:12px;color:var(--gr);margin-top:5px}.card-row{display:flex;gap:10px}.card-row .card{flex:1;min-width:0}
.stat-green .card-v{color:var(--g)}.stat-blue .card-v{color:var(--b)}.stat-red .card-v{color:var(--r)}.stat-purple .card-v{color:var(--p)}.stat-yellow .card-v{color:var(--y)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:12px;font-weight:700;font-size:14px;transition:all .15s}.btn:active{transform:scale(.99)}.btn-g{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff}.btn-o{background:var(--gl);color:var(--g);border:1px solid #bbf7d0}.btn-r{background:#fef2f2;color:var(--r);border:1px solid #fecaca}.btn-b{background:#eff6ff;color:var(--b);border:1px solid #bfdbfe}.btn-y{background:#fefce8;color:#a16207;border:1px solid #fde68a}.btn-sm{padding:9px 12px;font-size:12px;border-radius:10px}.btn-full{width:100%}
.form-group{margin-bottom:14px}.form-label{display:block;font-size:12px;font-weight:700;color:var(--gr);margin-bottom:5px}.form-row{display:flex;gap:10px}.form-row>*{flex:1;min-width:0}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}.sec-title{font-size:18px;font-weight:800}
.search-box{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--wh);border-radius:12px;border:1px solid var(--bd);margin-bottom:12px}.search-box input{border:none;outline:none;padding:0;font-size:14px}
.pills{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}.pill{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;background:#f1f5f9;color:var(--gr);white-space:nowrap}.pill.act{background:var(--g);color:#fff}
.list-item{display:flex;align-items:center;padding:12px;background:var(--wh);border-radius:14px;border:1px solid var(--bd);margin-bottom:8px;gap:10px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}.list-item:hover{border-color:#bbf7d0;background:#fbfefc}.li-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.li-info{flex:1;min-width:0}.li-name{font-weight:800;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.li-sub{font-size:12px;color:var(--gr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.li-right{text-align:right;flex-shrink:0}.li-amount{font-weight:800;font-size:14px;color:var(--g)}.li-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;display:inline-block}.st-active{background:var(--gl);color:var(--g)}.st-pending{background:#fef3c7;color:#92400e}.st-expired{background:#fef2f2;color:var(--r)}.st-suspended{background:#f1f5f9;color:var(--gr)}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.empty{text-align:center;padding:42px 20px;color:var(--gr)}.empty .ic{font-size:42px;margin-bottom:8px}
.toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;padding:11px 18px;border-radius:12px;font-weight:700;font-size:13px;z-index:120;box-shadow:var(--shadow)}.toast.err{background:var(--r)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:100;display:flex;align-items:flex-end;justify-content:center}.modal{background:var(--wh);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto}.modal-h{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--bd)}.modal-h h3{font-size:18px;font-weight:800}.modal-close{background:none;font-size:22px;color:var(--gr);padding:4px}.modal-body{padding:18px}
.detail-section{margin-bottom:20px}.detail-section h4{font-size:12px;font-weight:800;color:var(--gr);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}.detail-row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}.detail-row:last-child{border-bottom:none}.detail-label{color:var(--gr)}.detail-value{font-weight:700;text-align:right;max-width:62%;word-break:break-word}
.success-card{text-align:center;padding:8px 0 18px}.success-icon{width:66px;height:66px;border-radius:50%;background:var(--gl);color:var(--g);font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}.key-display{background:var(--lt);border:2px dashed var(--g);border-radius:12px;padding:14px;margin:14px 0;font-family:monospace;font-size:16px;font-weight:800;color:var(--g);word-break:break-all;letter-spacing:1px}.msg-preview{background:var(--lt);border-radius:12px;padding:14px;margin:14px 0;font-size:13px;color:var(--s);text-align:left;white-space:pre-line;line-height:1.5;border:1px solid var(--bd)}.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick-card{padding:14px;border-radius:14px;background:#fff;border:1px solid var(--bd);box-shadow:var(--shadow)}.quick-card h4{font-size:13px;font-weight:800;margin-bottom:4px}.quick-card p{font-size:12px;color:var(--gr);line-height:1.45}
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--bd);display:flex;z-index:40;padding:4px 0 max(4px,env(safe-area-inset-bottom))}.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0;background:none;font-size:10px;color:var(--gr);gap:2px}.bnav button.act{color:var(--g);font-weight:800}.bnav .ic{font-size:20px}
.pin-wrap{position:fixed;inset:0;background:#f8fafc;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;width:100%}.pin-btn{padding:16px;border-radius:12px;background:#fff;border:1px solid #e2e8f0;font-size:22px;font-weight:800;box-shadow:var(--shadow)}.p-dot{width:16px;height:16px;border-radius:50%;background:#e2e8f0;transition:background .15s}
.note{font-size:12px;color:var(--gr);line-height:1.5}.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:800;background:#eff6ff;color:var(--b)}
@media(max-width:420px){.form-row,.card-row{flex-direction:column}.quick-grid,.kpi-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="hdr hidden" id="mainHeader"><div class="hdr-l"><img src="kitatrack-logo.png" alt="KitaTrack" style="height:34px;width:auto"><div><div class="hdr-t">KitaTrack Admin</div><div class="hdr-s" id="hdrSub">Dashboard</div></div></div><div class="hdr-r"><button class="icon-btn" onclick="showSettings()" title="Settings">⚙️</button><button class="icon-btn" onclick="loadData(true)" title="Refresh">↻</button><div class="status-chip"><div id="onlineStatus" class="online-dot"></div><span id="onlineText">Online</span></div></div></header>
<div id="pinScreen" class="pin-wrap"><img src="kitatrack-logo.png" alt="KitaTrack Logo" style="height:82px;width:auto;display:block;margin:0 auto 18px"><h2 style="font-size:20px;font-weight:800;margin-bottom:4px">KitaTrack Admin</h2><p style="color:#64748b;font-size:14px;margin-bottom:24px">Enter PIN to continue</p><div style="display:flex;gap:12px;margin-bottom:24px" id="pinDots"><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div><div class="p-dot"></div></div><div id="pinErr" style="color:#dc2626;font-size:13px;margin-bottom:12px;height:20px"></div><div class="pin-grid"><button class="pin-btn" onclick="pinAdd('1')">1</button><button class="pin-btn" onclick="pinAdd('2')">2</button><button class="pin-btn" onclick="pinAdd('3')">3</button><button class="pin-btn" onclick="pinAdd('4')">4</button><button class="pin-btn" onclick="pinAdd('5')">5</button><button class="pin-btn" onclick="pinAdd('6')">6</button><button class="pin-btn" onclick="pinAdd('7')">7</button><button class="pin-btn" onclick="pinAdd('8')">8</button><button class="pin-btn" onclick="pinAdd('9')">9</button><div></div><button class="pin-btn" onclick="pinAdd('0')">0</button><button class="pin-btn" onclick="pinDel()">⌫</button></div></div>
<div id="app" class="hidden"></div>
<nav class="bnav hidden" id="mainNav"><button onclick="go('dashboard')" id="nav-dashboard" class="act"><span class="ic">📊</span>Dashboard</button><button onclick="go('create')" id="nav-create"><span class="ic">➕</span>Create</button><button onclick="go('licenses')" id="nav-licenses"><span class="ic">🔑</span>Licenses</button><button onclick="go('payments')" id="nav-payments"><span class="ic">💰</span>Payments</button><button onclick="go('customers')" id="nav-customers"><span class="ic">👥</span>Customers</button></nav>
<div id="toastEl" class="hidden"></div><div id="modalEl"></div>
<script>
const SB_URL='https://lrixoqxtgfnwadbospae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaXhvcXh0Z2Zud2FkYm9zcGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5ODksImV4cCI6MjA5MDcwMjk4OX0.cVg3UDzPdIAgLci7TYWeschTR1tZCzXxcC-DQW6J1QY';
const sbHeaders={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const DEFAULT_SETTINGS={publicAppUrl:'https://kitatrack.vercel.app/pos.html',businessName:'KitaTrack POS',supportName:'KitaTrack POS Team',supportPhone:'',adminPin:'0715'};
function loadSettings(){try{return {...DEFAULT_SETTINGS,...(JSON.parse(localStorage.getItem('kt_admin_settings')||'{}'))};}catch(e){return {...DEFAULT_SETTINGS};}}
function saveSettings(next){localStorage.setItem('kt_admin_settings',JSON.stringify(next));}
let settings=loadSettings();
const peso=n=>'₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2});
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}):'—';
const fmtTime=d=>d?new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}):'';
const fmtDT=d=>d?`${fmtDate(d)} ${fmtTime(d)}`:'—';
function slugPlan(plan){return ['basic','business','pro','custom'].includes(plan)?plan:'basic';}
function escapeHtml(str=''){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function genKey(){const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let key='';for(let i=0;i<16;i++){key+=chars[Math.floor(Math.random()*chars.length)];if(i===3||i===7||i===11)key+='-';}return key;}
function calcExpiry(period){if(period==='lifetime')return null;const now=new Date();if(period==='daily')now.setDate(now.getDate()+1);else if(period==='monthly')now.setMonth(now.getMonth()+1);else if(period==='trial')now.setDate(now.getDate()+3);return now.toISOString();}
function calcAmount(plan,period){const prices={basic:{daily:50,monthly:1200,lifetime:3000,trial:0},business:{daily:70,monthly:2000,lifetime:5000,trial:0},pro:{daily:100,monthly:3000,lifetime:8000,trial:0},custom:{daily:100,monthly:3000,lifetime:10000,trial:0}};return prices[slugPlan(plan)]?.[period]??0;}
function statusDot(s){const colors={active:'var(--g)',pending:'var(--y)',expired:'var(--r)',suspended:'var(--gr)'};return `<div class="li-dot" style="background:${colors[s]||'var(--gr)'}"></div>`;}
function statusBadge(s){const cls={active:'st-active',pending:'st-pending',expired:'st-expired',suspended:'st-suspended'};return `<span class="li-status ${cls[s]||'st-suspended'}">${escapeHtml(s||'unknown')}</span>`;}
function isExpired(license){return license.expires_at&&new Date(license.expires_at)<new Date();}
function effectiveStatus(license){if(license.status==='active'&&isExpired(license))return 'expired';return license.status||'pending';}
function publicLinkForLicense(lic){return `${settings.publicAppUrl}?plan=${slugPlan(lic.plan)}`;}
function publicDemoLink(plan){return `${settings.publicAppUrl}?plan=${slugPlan(plan)}&demo=true`;}
function genMessage(lic){return `Hi ${lic.customer_name}! 👋\n\nYour ${settings.businessName} is now activated ✅\n\n🔑 License Key:\n${lic.license_key}\n\n📦 Plan: ${(lic.plan||'').charAt(0).toUpperCase()+(lic.plan||'').slice(1)}\n📅 ${lic.period==='lifetime'?'Lifetime (never expires)':'Valid until: '+fmtDate(lic.expires_at)}\n\n👉 Open the app:\n${settings.publicAppUrl}\n\nEnter your key to start.\n\n${settings.supportPhone?'📞 Support: '+settings.supportPhone+'\n\n':''}Salamat! 🙏\n— ${settings.supportName}`;}
function toast(msg,err=false){const el=document.getElementById('toastEl');el.className='toast'+(err?' err':'');el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),2600);}
async function copyText(text){try{await navigator.clipboard.writeText(text);toast('Copied!');}catch{toast('Copy failed',true);}}
function downloadJson(filename,data){const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);}
function downloadCsv(filename,rows){const csv=rows.map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href);}
async function sbGet(table,query='select=*'){const connector=query?(query.startsWith('select=')?'?':'?'+query):'?select=*';const r=await fetch(`${SB_URL}/rest/v1/${table}${connector}${connector.includes('order=')?'':(connector.includes('?')?'&':'?')+'order=created_at.desc'}`,{headers:{...sbHeaders}});if(!r.ok)throw new Error(`GET ${table} failed`);return await r.json();}
async function sbInsert(table,data){const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...sbHeaders,'Prefer':'return=representation'},body:JSON.stringify(data)});if(!r.ok)return null;return await r.json();}
async function sbUpdate(table,id,data){const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{method:'PATCH',headers:{...sbHeaders,'Prefer':'return=representation'},body:JSON.stringify(data)});if(!r.ok)return null;return await r.json();}
async function sbDelete(table,id){const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:{...sbHeaders}});return r.ok;}
let currentPage='dashboard',licenses=[],payments=[],searchQ='',filterStatus='all',filterPlan='all';
let pinValue='';function getAdminPin(){return loadSettings().adminPin||'0715';}
function pinAdd(d){if(pinValue.length>=4)return;pinValue+=d;document.getElementById('pinErr').textContent='';document.querySelectorAll('.p-dot').forEach((dot,i)=>{dot.style.background=i<pinValue.length?'#16a34a':'#e2e8f0';});if(pinValue.length===4){setTimeout(()=>{if(pinValue===getAdminPin()){unlockAdmin();}else{document.getElementById('pinErr').textContent='Wrong PIN. Try again.';pinValue='';document.querySelectorAll('.p-dot').forEach(dot=>dot.style.background='#dc2626');setTimeout(()=>{document.querySelectorAll('.p-dot').forEach(dot=>dot.style.background='#e2e8f0');},500);}},180);}}
function pinDel(){pinValue=pinValue.slice(0,-1);document.querySelectorAll('.p-dot').forEach((dot,i)=>{dot.style.background=i<pinValue.length?'#16a34a':'#e2e8f0';});}
function unlockAdmin(){document.getElementById('pinScreen').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('mainHeader').classList.remove('hidden');document.getElementById('mainNav').classList.remove('hidden');sessionStorage.setItem('kt_admin_auth','true');}
function logoutAdmin(){sessionStorage.removeItem('kt_admin_auth');location.reload();}
document.addEventListener('keydown',e=>{if(document.getElementById('pinScreen').classList.contains('hidden'))return;if(e.key>='0'&&e.key<='9')pinAdd(e.key);if(e.key==='Backspace')pinDel();});
function updateOnlineStatus(){const dot=document.getElementById('onlineStatus');const text=document.getElementById('onlineText');if(navigator.onLine){dot.className='online-dot';text.textContent='Online';}else{dot.className='online-dot offline-dot';text.textContent='Offline';}}
window.addEventListener('online',updateOnlineStatus);window.addEventListener('offline',updateOnlineStatus);
async function loadData(showMessage=false){try{licenses=await sbGet('licenses','select=*');payments=await sbGet('payments','select=*');syncExpiredLocally();if(showMessage)toast('Data refreshed');}catch(e){console.error(e);toast('Failed to load data',true);}render();}
function syncExpiredLocally(){licenses=licenses.map(l=>effectiveStatus(l)==='expired'?{...l,status:'expired'}:l);}
function go(page){currentPage=page;searchQ='';filterStatus='all';filterPlan='all';document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('act'));const navBtn=document.getElementById('nav-'+page);if(navBtn)navBtn.classList.add('act');document.getElementById('hdrSub').textContent={dashboard:'Dashboard',create:'Create License',licenses:'Licenses',payments:'Payments',customers:'Customers'}[page]||'';render();}
function render(){const app=document.getElementById('app');if(currentPage==='dashboard')app.innerHTML=renderDashboard();else if(currentPage==='create')app.innerHTML=renderCreate();else if(currentPage==='licenses')app.innerHTML=renderLicenses();else if(currentPage==='payments')app.innerHTML=renderPayments();else if(currentPage==='customers')app.innerHTML=renderCustomers();}
function renderDashboard(){const active=licenses.filter(l=>effectiveStatus(l)==='active').length,expired=licenses.filter(l=>effectiveStatus(l)==='expired').length,pending=licenses.filter(l=>effectiveStatus(l)==='pending').length,suspended=licenses.filter(l=>effectiveStatus(l)==='suspended').length,total=licenses.length,revenue=licenses.filter(l=>['active','expired','suspended'].includes(effectiveStatus(l))).reduce((s,l)=>s+Number(l.amount||0),0);const today=new Date().toDateString();const todayLicenses=licenses.filter(l=>new Date(l.created_at).toDateString()===today);const todayRevenue=todayLicenses.reduce((s,l)=>s+Number(l.amount||0),0);const monthly=licenses.filter(l=>{const d=new Date(l.created_at),n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).reduce((s,l)=>s+Number(l.amount||0),0);let h=`<div class="page"><div class="kpi-grid"><div class="card stat-green"><div class="card-t">Today Revenue</div><div class="card-v">${peso(todayRevenue)}</div><div class="card-sub">${todayLicenses.length} license(s)</div></div><div class="card stat-blue"><div class="card-t">Month Revenue</div><div class="card-v">${peso(monthly)}</div><div class="card-sub">${fmtDate(new Date())}</div></div><div class="card stat-purple"><div class="card-t">Total Revenue</div><div class="card-v">${peso(revenue)}</div><div class="card-sub">${total} total license(s)</div></div><div class="card stat-yellow"><div class="card-t">Pending</div><div class="card-v">${pending}</div><div class="card-sub">${active} active · ${expired} expired</div></div></div><div class="quick-grid"><div class="quick-card"><h4>➕ Create Cash License</h4><p>Create and send a key instantly for walk-in customers.</p><button class="btn btn-g btn-sm btn-full" style="margin-top:10px" onclick="go('create')">Create Now</button></div><div class="quick-card"><h4>🎮 Demo Links</h4><p>Copy test links for Basic, Business, and Pro.</p><button class="btn btn-o btn-sm btn-full" style="margin-top:10px" onclick="showDemoLinks()">Open</button></div><div class="quick-card"><h4>💳 Payment QR</h4><p>Show GCash and Maya QR codes for customers ready to pay.</p><button class="btn btn-y btn-sm btn-full" style="margin-top:10px" onclick="showPaymentQR()">Show QR</button></div><div class="quick-card"><h4>📦 Export Backup</h4><p>Download licenses and payments as JSON or CSV.</p><button class="btn btn-b btn-sm btn-full" style="margin-top:10px" onclick="showExportModal()">Export</button></div><div class="quick-card"><h4>🧪 Test Customer App</h4><p>Open the public POS app quickly from the admin panel.</p><a class="btn btn-y btn-sm btn-full" style="margin-top:10px" target="_blank" href="${escapeHtml(settings.publicAppUrl)}">Open POS</a></div></div><div class="card-row"><div class="card stat-green"><div class="card-t">Active</div><div class="card-v">${active}</div></div><div class="card stat-red"><div class="card-t">Expired</div><div class="card-v">${expired}</div></div></div><div class="card"><div class="card-t">Suspended</div><div class="card-v" style="color:var(--gr)">${suspended}</div></div><div class="sec-header" style="margin-top:20px"><div class="sec-title">Recent Licenses</div><button class="btn btn-o btn-sm" onclick="go('licenses')">View All</button></div>`;const recent=[...licenses].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,8);if(!recent.length){h+=`<div class="empty"><div class="ic">📋</div>No licenses yet.<br>Create your first license.</div>`;}else{recent.forEach(l=>{h+=`<div class="list-item" onclick="showLicenseDetail('${l.id}')">${statusDot(effectiveStatus(l))}<div class="li-info"><div class="li-name">${escapeHtml(l.customer_name||'Unknown')}</div><div class="li-sub">${escapeHtml((l.plan||'').charAt(0).toUpperCase()+(l.plan||'').slice(1))} · ${escapeHtml(l.period||'—')} · ${fmtDate(l.created_at)}</div></div><div class="li-right"><div class="li-amount">${peso(l.amount)}</div>${statusBadge(effectiveStatus(l))}</div></div>`;});}h+=`</div>`;return h;}
function renderCreate(){return `<div class="page"><div class="card"><h3 style="font-weight:800;font-size:16px;margin-bottom:16px">➕ Create New License</h3><div class="form-group"><label class="form-label">Customer Name *</label><input id="cName" placeholder="Juan Dela Cruz"></div><div class="form-row"><div class="form-group"><label class="form-label">Email</label><input id="cEmail" type="email" placeholder="Optional"></div><div class="form-group"><label class="form-label">Phone</label><input id="cPhone" placeholder="09XX XXX XXXX"></div></div><div class="form-row"><div class="form-group"><label class="form-label">Plan *</label><select id="cPlan" onchange="updateAmount()"><option value="basic">Basic</option><option value="business">Business</option><option value="pro">Pro</option><option value="custom">Custom</option></select></div><div class="form-group"><label class="form-label">Period *</label><select id="cPeriod" onchange="updateAmount()"><option value="daily">Daily</option><option value="monthly">Monthly</option><option value="lifetime">Lifetime</option><option value="trial">Trial (3 days)</option></select></div></div><div class="form-row"><div class="form-group"><label class="form-label">Payment Method</label><select id="cMethod"><option value="cash">Cash</option><option value="gcash">GCash</option><option value="maya">Maya</option><option value="free">Free Trial</option></select></div><div class="form-group"><label class="form-label">Amount (₱)</label><input id="cAmount" type="number" value="50"></div></div><div class="form-group"><label class="form-label">Notes</label><textarea id="cNotes" rows="2" placeholder="Optional notes..."></textarea></div><div class="form-group"><label style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--s)"><input type="checkbox" id="cRecordPayment" checked style="width:auto"> Record payment automatically</label></div><button class="btn btn-g btn-full" onclick="createLicense()">🔑 Create & Activate License</button></div><div class="card" style="background:var(--gl);border-color:#bbf7d0"><div style="font-weight:800;font-size:14px;margin-bottom:8px">💡 Quick Pricing Guide</div><div class="note"><strong>Basic:</strong> ₱50/day · ₱1,200/month · ₱3,000 lifetime<br><strong>Business:</strong> ₱70/day · ₱2,000/month · ₱5,000 lifetime<br><strong>Pro:</strong> ₱100/day · ₱3,000/month · ₱8,000+ lifetime<br><strong>Trial:</strong> ₱0 (3 days free)</div></div></div>`;}
function updateAmount(){const plan=document.getElementById('cPlan').value,period=document.getElementById('cPeriod').value,amount=calcAmount(plan,period);document.getElementById('cAmount').value=amount;if(period==='trial')document.getElementById('cMethod').value='free';}
async function createLicense(){const name=document.getElementById('cName').value.trim(),email=document.getElementById('cEmail').value.trim(),phone=document.getElementById('cPhone').value.trim(),plan=document.getElementById('cPlan').value,period=document.getElementById('cPeriod').value,method=document.getElementById('cMethod').value,amount=Number(document.getElementById('cAmount').value||0),notes=document.getElementById('cNotes').value.trim(),autoPayment=document.getElementById('cRecordPayment').checked;if(!name){toast('Please enter customer name',true);return;}const key=genKey(),now=new Date().toISOString(),expires=calcExpiry(period);const data={customer_name:name,customer_email:email||null,customer_phone:phone||null,plan,period,payment_method:method,amount,license_key:key,status:'active',activated_at:now,expires_at:expires,notes:notes||null};const result=await sbInsert('licenses',data);if(result&&result.length){const lic=result[0];licenses.unshift(lic);if(autoPayment&&amount>0){const payRes=await sbInsert('payments',{license_id:lic.id,amount:amount,method:method,reference_number:null,verified:true,verified_at:now});if(payRes&&payRes.length)payments.unshift(payRes[0]);}showSuccessModal(lic);toast('License created! ✓');render();}else{toast('Failed to create license',true);}}
function renderLicenses(){let filtered=[...licenses];if(filterStatus!=='all')filtered=filtered.filter(l=>effectiveStatus(l)===filterStatus);if(filterPlan!=='all')filtered=filtered.filter(l=>slugPlan(l.plan)===filterPlan);if(searchQ){const q=searchQ.toLowerCase();filtered=filtered.filter(l=>(l.customer_name||'').toLowerCase().includes(q)||(l.license_key||'').toLowerCase().includes(q)||(l.customer_email||'').toLowerCase().includes(q)||(l.customer_phone||'').toLowerCase().includes(q));}let h=`<div class="page"><div class="search-box"><span>🔍</span><input placeholder="Search name, key, email, phone..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div><div class="pills"><button class="pill${filterStatus==='all'?' act':''}" onclick="filterStatus='all';render()">All (${licenses.length})</button><button class="pill${filterStatus==='active'?' act':''}" onclick="filterStatus='active';render()">Active</button><button class="pill${filterStatus==='pending'?' act':''}" onclick="filterStatus='pending';render()">Pending</button><button class="pill${filterStatus==='expired'?' act':''}" onclick="filterStatus='expired';render()">Expired</button><button class="pill${filterStatus==='suspended'?' act':''}" onclick="filterStatus='suspended';render()">Suspended</button></div><div class="pills" style="margin-top:-4px"><button class="pill${filterPlan==='all'?' act':''}" onclick="filterPlan='all';render()">All Plans</button><button class="pill${filterPlan==='basic'?' act':''}" onclick="filterPlan='basic';render()">Basic</button><button class="pill${filterPlan==='business'?' act':''}" onclick="filterPlan='business';render()">Business</button><button class="pill${filterPlan==='pro'?' act':''}" onclick="filterPlan='pro';render()">Pro</button><button class="pill${filterPlan==='custom'?' act':''}" onclick="filterPlan='custom';render()">Custom</button></div>`;if(!filtered.length){h+=`<div class="empty"><div class="ic">🔑</div>No licenses found.</div>`;}else{filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(l=>{h+=`<div class="list-item" onclick="showLicenseDetail('${l.id}')">${statusDot(effectiveStatus(l))}<div class="li-info"><div class="li-name">${escapeHtml(l.customer_name||'Unknown')}</div><div class="li-sub">${escapeHtml(l.license_key||'—')}</div></div><div class="li-right"><div class="li-amount">${peso(l.amount)}</div>${statusBadge(effectiveStatus(l))}</div></div>`;});}h+=`</div>`;return h;}
function renderPayments(){let filtered=[...payments];if(searchQ){const q=searchQ.toLowerCase();filtered=filtered.filter(p=>{const lic=licenses.find(l=>l.id===p.license_id);return (lic?.customer_name||'').toLowerCase().includes(q)||(p.method||'').toLowerCase().includes(q)||(p.reference_number||'').toLowerCase().includes(q);});}let h=`<div class="page"><div class="sec-header"><div class="sec-title">Payments</div><button class="btn btn-o btn-sm" onclick="showRecordPayment()">+ Record</button></div><div class="search-box"><span>🔍</span><input placeholder="Search customer, method, ref..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div>`;if(!filtered.length){h+=`<div class="empty"><div class="ic">💰</div>No payments recorded yet.</div>`;}else{filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).forEach(p=>{const lic=licenses.find(l=>l.id===p.license_id);h+=`<div class="list-item" onclick="showPaymentDetail('${p.id}')"><div style="font-size:20px">${p.verified?'✅':'⏳'}</div><div class="li-info"><div class="li-name">${escapeHtml(lic?.customer_name||'Unknown')}</div><div class="li-sub">${escapeHtml(p.method||'—')} · ${escapeHtml(p.reference_number||'No ref')} · ${fmtDate(p.created_at)}</div></div><div class="li-right"><div class="li-amount">${peso(p.amount)}</div>${p.verified?'<span class="li-status st-active">Verified</span>':`<button class="btn btn-o btn-sm" onclick="event.stopPropagation();verifyPayment('${p.id}')">Verify</button>`}</div></div>`;});}h+=`</div>`;return h;}
function renderCustomers(){const grouped={};licenses.forEach(l=>{const key=(l.customer_email||l.customer_phone||l.customer_name||'unknown').toLowerCase();if(!grouped[key])grouped[key]={name:l.customer_name||'Unknown',email:l.customer_email||'',phone:l.customer_phone||'',licenses:[]};grouped[key].licenses.push(l);});let customers=Object.values(grouped);if(searchQ){const q=searchQ.toLowerCase();customers=customers.filter(c=>c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q)||c.phone.toLowerCase().includes(q));}let h=`<div class="page"><div class="search-box"><span>🔍</span><input placeholder="Search customer..." value="${escapeHtml(searchQ)}" oninput="searchQ=this.value;render()"></div>`;if(!customers.length){h+=`<div class="empty"><div class="ic">👥</div>No customers found.</div>`;}else{customers.sort((a,b)=>a.name.localeCompare(b.name)).forEach(c=>{const activeCount=c.licenses.filter(l=>effectiveStatus(l)==='active').length;h+=`<div class="list-item" onclick="showCustomerDetail('${escapeHtml((c.email||c.phone||c.name).replace(/'/g,"\\'"))}')"><div style="font-size:20px">👤</div><div class="li-info"><div class="li-name">${escapeHtml(c.name)}</div><div class="li-sub">${escapeHtml(c.email||c.phone||'No contact info')} · ${c.licenses.length} license(s)</div></div><div class="li-right"><div class="li-amount">${activeCount} active</div><span class="li-status st-active">Customer</span></div></div>`;});}h+=`</div>`;return h;}
function closeModal(){document.getElementById('modalEl').innerHTML='';}

function showLicenseDetail(id){const l=licenses.find(x=>x.id===id);if(!l)return;const msg=genMessage(l);const payList=payments.filter(p=>p.license_id===l.id);document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>License Details</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div style="text-align:center;margin-bottom:16px"><h3 style="font-size:18px;font-weight:800">${escapeHtml(l.customer_name||'Unknown')}</h3><div style="margin-top:6px">${statusBadge(effectiveStatus(l))}</div></div><div class="detail-section"><h4>License Info</h4><div class="detail-row"><span class="detail-label">Key</span><span class="detail-value" style="color:var(--g);font-family:monospace">${escapeHtml(l.license_key||'—')}</span></div><div class="detail-row"><span class="detail-label">Plan</span><span class="detail-value">${escapeHtml((l.plan||'').charAt(0).toUpperCase()+(l.plan||'').slice(1))}</span></div><div class="detail-row"><span class="detail-label">Period</span><span class="detail-value">${escapeHtml(l.period||'—')}</span></div><div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value">${peso(l.amount)}</span></div><div class="detail-row"><span class="detail-label">Payment</span><span class="detail-value">${escapeHtml(l.payment_method||'—')}</span></div><div class="detail-row"><span class="detail-label">App Link</span><span class="detail-value"><a target="_blank" style="color:var(--b)" href="${escapeHtml(publicLinkForLicense(l))}">Open</a></span></div></div><div class="detail-section"><h4>Dates</h4><div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${fmtDT(l.created_at)}</span></div><div class="detail-row"><span class="detail-label">Activated</span><span class="detail-value">${fmtDT(l.activated_at)}</span></div><div class="detail-row"><span class="detail-label">Expires</span><span class="detail-value">${l.expires_at?fmtDT(l.expires_at):'Never (Lifetime)'}</span></div></div><div class="detail-section"><h4>Customer</h4><div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escapeHtml(l.customer_email||'—')}</span></div><div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${escapeHtml(l.customer_phone||'—')}</span></div>${l.notes?`<div class="detail-row"><span class="detail-label">Notes</span><span class="detail-value">${escapeHtml(l.notes)}</span></div>`:''}</div><div class="detail-section"><h4>Payments</h4>${payList.length?payList.map(p=>`<div class="detail-row"><span class="detail-label">${escapeHtml(p.method||'—')} · ${fmtDate(p.created_at)}</span><span class="detail-value">${peso(p.amount)} ${p.verified?'✅':'⏳'}</span></div>`).join(''):`<div class="note">No payments linked yet.</div>`}</div><div class="action-btns"><button class="btn btn-g btn-full" onclick="copyText('${escapeHtml(l.license_key)}')">📋 Copy Key</button><button class="btn btn-o btn-full" onclick='copyText(${JSON.stringify(msg)})'>💬 Copy Message</button><button class="btn btn-b btn-full" onclick='copyText(${JSON.stringify(publicLinkForLicense(l))})'>🔗 Copy App Link</button>${effectiveStatus(l)==='active'?`<button class="btn btn-r btn-full" onclick="updateLicenseStatus('${l.id}','suspended')">⏸ Suspend</button>`:''}${['suspended','expired','pending'].includes(effectiveStatus(l))?`<button class="btn btn-g btn-full" onclick="updateLicenseStatus('${l.id}','active')">✅ Activate</button>`:''}<button class="btn btn-r btn-full" onclick="if(confirm('Delete this license?')) deleteLicense('${l.id}')">🗑 Delete</button></div></div></div></div>`;}
function showPaymentDetail(id){const p=payments.find(x=>x.id===id);if(!p)return;const lic=licenses.find(l=>l.id===p.license_id);document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Payment Details</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="detail-section"><div class="detail-row"><span class="detail-label">Customer</span><span class="detail-value">${escapeHtml(lic?.customer_name||'Unknown')}</span></div><div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value">${peso(p.amount)}</span></div><div class="detail-row"><span class="detail-label">Method</span><span class="detail-value">${escapeHtml(p.method||'—')}</span></div><div class="detail-row"><span class="detail-label">Reference #</span><span class="detail-value">${escapeHtml(p.reference_number||'—')}</span></div><div class="detail-row"><span class="detail-label">Created</span><span class="detail-value">${fmtDT(p.created_at)}</span></div><div class="detail-row"><span class="detail-label">Verified</span><span class="detail-value">${p.verified?'Yes':'No'}</span></div><div class="detail-row"><span class="detail-label">Verified At</span><span class="detail-value">${fmtDT(p.verified_at)}</span></div></div>${!p.verified?`<button class="btn btn-g btn-full" onclick="verifyPayment('${p.id}')">✅ Verify Payment</button>`:''}</div></div></div>`;}
function showCustomerDetail(key){const customerLicenses=licenses.filter(l=>(l.customer_email||l.customer_phone||l.customer_name||'unknown').toLowerCase()===key.toLowerCase());if(!customerLicenses.length)return;const first=customerLicenses[0];const customerPayments=payments.filter(p=>customerLicenses.some(l=>l.id===p.license_id));document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Customer Profile</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="detail-section"><div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${escapeHtml(first.customer_name||'Unknown')}</span></div><div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escapeHtml(first.customer_email||'—')}</span></div><div class="detail-row"><span class="detail-label">Phone</span><span class="detail-value">${escapeHtml(first.customer_phone||'—')}</span></div><div class="detail-row"><span class="detail-label">Licenses</span><span class="detail-value">${customerLicenses.length}</span></div></div><div class="detail-section"><h4>Licenses</h4>${customerLicenses.map(l=>`<div class="detail-row"><span class="detail-label">${escapeHtml((l.plan||'').toUpperCase())} · ${escapeHtml(l.period||'—')}</span><span class="detail-value">${statusBadge(effectiveStatus(l))}</span></div>`).join('')}</div><div class="detail-section"><h4>Payments</h4>${customerPayments.length?customerPayments.map(p=>`<div class="detail-row"><span class="detail-label">${fmtDate(p.created_at)} · ${escapeHtml(p.method||'—')}</span><span class="detail-value">${peso(p.amount)}</span></div>`).join(''):`<div class="note">No payments recorded.</div>`}</div></div></div></div>`;}
function showRecordPayment(){const opts=licenses.map(l=>`<option value="${l.id}">${escapeHtml(l.customer_name)} (${escapeHtml((l.license_key||'').slice(0,8))}...)</option>`).join('');document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Record Payment</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="form-group"><label class="form-label">Customer License *</label><select id="pLicense">${opts}</select></div><div class="form-row"><div class="form-group"><label class="form-label">Amount (₱)</label><input id="pAmount" type="number" placeholder="0"></div><div class="form-group"><label class="form-label">Method</label><select id="pMethod"><option value="cash">Cash</option><option value="gcash">GCash</option><option value="maya">Maya</option></select></div></div><div class="form-group"><label class="form-label">Reference #</label><input id="pRef" placeholder="Optional"></div><button class="btn btn-g btn-full" onclick="recordPayment()">💰 Record Payment</button></div></div></div>`;}
function showDemoLinks(){document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Demo Links</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="chip" style="margin-bottom:12px">Use these for testing</div><div class="action-btns"><button class="btn btn-o btn-full" onclick='copyText(${JSON.stringify(publicDemoLink('basic'))})'>📋 Copy Basic Demo</button><button class="btn btn-b btn-full" onclick='copyText(${JSON.stringify(publicDemoLink('business'))})'>📋 Copy Business Demo</button><button class="btn btn-y btn-full" onclick='copyText(${JSON.stringify(publicDemoLink('pro'))})'>📋 Copy Pro Demo</button></div><div class="msg-preview">Basic Demo:\n${escapeHtml(publicDemoLink('basic'))}\n\nBusiness Demo:\n${escapeHtml(publicDemoLink('business'))}\n\nPro Demo:\n${escapeHtml(publicDemoLink('pro'))}</div></div></div></div>`;}

function showPaymentQR(){
  document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Pay Now</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="card" style="text-align:center"><img src="gcash-qr.jpeg" alt="GCash QR" style="width:100%;max-width:320px;border-radius:18px;border:1px solid #e2e8f0;margin-bottom:12px"><div style="font-weight:800;color:#2563eb;font-size:16px">GCash</div></div><div class="card" style="text-align:center"><img src="maya-qr.jpeg" alt="Maya QR" style="width:100%;max-width:320px;border-radius:18px;border:1px solid #e2e8f0;margin-bottom:12px"><div style="font-weight:800;color:#16a34a;font-size:16px">Maya</div></div><div class="note">After payment, create the license here in admin and send the key plus app link to the customer.</div></div></div></div>`;
}

function showExportModal(){document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Export Data</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="action-btns"><button class="btn btn-g btn-full" onclick="exportJson()">⬇ Export JSON Backup</button><button class="btn btn-b btn-full" onclick="exportLicensesCsv()">⬇ Export Licenses CSV</button><button class="btn btn-o btn-full" onclick="exportPaymentsCsv()">⬇ Export Payments CSV</button></div></div></div></div>`;}
async function updateLicenseStatus(id,status){const update={status};if(status==='active')update.activated_at=new Date().toISOString();const result=await sbUpdate('licenses',id,update);if(result){const idx=licenses.findIndex(l=>l.id===id);if(idx>=0)licenses[idx]={...licenses[idx],...update};toast('Status updated!');closeModal();render();}else{toast('Update failed',true);}}
async function deleteLicense(id){const ok=await sbDelete('licenses',id);if(ok){licenses=licenses.filter(l=>l.id!==id);payments=payments.filter(p=>p.license_id!==id);toast('License deleted');closeModal();render();}else{toast('Delete failed',true);}}
async function recordPayment(){const licenseId=document.getElementById('pLicense').value,amount=Number(document.getElementById('pAmount').value||0),method=document.getElementById('pMethod').value,ref=document.getElementById('pRef').value.trim();if(!licenseId||!amount){toast('Fill in required fields',true);return;}const data={license_id:licenseId,amount:amount,method:method,reference_number:ref||null,verified:false};const result=await sbInsert('payments',data);if(result&&result.length){payments.unshift(result[0]);toast('Payment recorded!');closeModal();render();}else{toast('Failed to record payment',true);}}
async function verifyPayment(id){const result=await sbUpdate('payments',id,{verified:true,verified_at:new Date().toISOString()});if(result){const idx=payments.findIndex(p=>p.id===id);if(idx>=0)payments[idx]={...payments[idx],verified:true,verified_at:new Date().toISOString()};toast('Payment verified!');closeModal();render();}else{toast('Verification failed',true);}}
function exportJson(){downloadJson('kitatrack-admin-backup.json',{licenses,payments,exported_at:new Date().toISOString()});toast('JSON exported');}
function exportLicensesCsv(){const rows=[['Customer Name','Email','Phone','Plan','Period','Amount','Payment Method','License Key','Status','Created At','Expires At']];licenses.forEach(l=>rows.push([l.customer_name,l.customer_email,l.customer_phone,l.plan,l.period,l.amount,l.payment_method,l.license_key,effectiveStatus(l),l.created_at,l.expires_at]));downloadCsv('kitatrack-licenses.csv',rows);toast('Licenses CSV exported');}
function exportPaymentsCsv(){const rows=[['Customer Name','Amount','Method','Reference','Verified','Created At']];payments.forEach(p=>{const lic=licenses.find(l=>l.id===p.license_id);rows.push([lic?.customer_name||'Unknown',p.amount,p.method,p.reference_number,p.verified?'Yes':'No',p.created_at]);});downloadCsv('kitatrack-payments.csv',rows);toast('Payments CSV exported');}
function showSettings(){settings=loadSettings();document.getElementById('modalEl').innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>⚙️ Settings</h3><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="card"><h4 style="font-weight:800;font-size:15px;margin-bottom:12px">Public App Settings</h4><div class="form-group"><label class="form-label">Public App URL</label><input id="sPublicUrl" value="${escapeHtml(settings.publicAppUrl)}" placeholder="https://kitatrack.vercel.app/pos.html"></div><div class="form-group"><label class="form-label">Business Name</label><input id="sBusinessName" value="${escapeHtml(settings.businessName)}"></div><div class="form-group"><label class="form-label">Support Name</label><input id="sSupportName" value="${escapeHtml(settings.supportName)}"></div><div class="form-group"><label class="form-label">Support Phone</label><input id="sSupportPhone" value="${escapeHtml(settings.supportPhone)}" placeholder="Optional"></div></div><div class="card"><h4 style="font-weight:800;font-size:15px;margin-bottom:12px">Admin PIN</h4><div class="form-group"><label class="form-label">Current PIN</label><input id="oldPin" type="password" maxlength="4" style="text-align:center;font-size:18px;letter-spacing:8px"></div><div class="form-group"><label class="form-label">New PIN</label><input id="newPin" type="password" maxlength="4" style="text-align:center;font-size:18px;letter-spacing:8px" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div><div class="form-group"><label class="form-label">Confirm New PIN</label><input id="confirmPin" type="password" maxlength="4" style="text-align:center;font-size:18px;letter-spacing:8px" oninput="this.value=this.value.replace(/[^0-9]/g,'')"></div><button class="btn btn-g btn-full" onclick="changePin()">🔑 Change PIN</button><button class="btn btn-r btn-full" style="margin-top:8px" onclick="resetPin()">Reset to Default PIN</button></div><button class="btn btn-b btn-full" onclick="savePublicSettings()">💾 Save Settings</button><button class="btn btn-r btn-full" style="margin-top:10px" onclick="logoutAdmin()">🚪 Lock Admin</button></div></div></div>`;}
function savePublicSettings(){settings={...loadSettings(),publicAppUrl:document.getElementById('sPublicUrl').value.trim()||DEFAULT_SETTINGS.publicAppUrl,businessName:document.getElementById('sBusinessName').value.trim()||DEFAULT_SETTINGS.businessName,supportName:document.getElementById('sSupportName').value.trim()||DEFAULT_SETTINGS.supportName,supportPhone:document.getElementById('sSupportPhone').value.trim()};saveSettings(settings);toast('Settings saved');closeModal();}
function changePin(){const currentPin=getAdminPin(),oldPin=document.getElementById('oldPin').value,newPin=document.getElementById('newPin').value,confirmPin=document.getElementById('confirmPin').value;if(oldPin!==currentPin){toast('Current PIN is wrong',true);return;}if(newPin.length!==4){toast('New PIN must be 4 digits',true);return;}if(newPin!==confirmPin){toast('PINs do not match',true);return;}settings={...loadSettings(),adminPin:newPin};saveSettings(settings);toast('PIN changed');closeModal();}
function resetPin(){if(confirm('Reset PIN back to 0715?')){settings={...loadSettings(),adminPin:'0715'};saveSettings(settings);toast('PIN reset to 0715');closeModal();}}
if(sessionStorage.getItem('kt_admin_auth')==='true'){unlockAdmin();}
updateOnlineStatus();loadData();setInterval(()=>{if(navigator.onLine&&!document.getElementById('pinScreen').classList.contains('hidden'))loadData();},60000);
</script>
