<script>
const ADMIN_API = '/api/admin';

async function createLicense(){
  const name=document.getElementById('cName').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const plan=document.getElementById('cPlan').value;
  const period=document.getElementById('cPeriod').value;
  const method=document.getElementById('cMethod').value;
  const amount=document.getElementById('cAmount').value;

  if(!name){
    alert('Enter name');
    return;
  }

  try{
    const res = await fetch(ADMIN_API,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-admin-pin':'0715'
      },
      body: JSON.stringify({
        action:'create_license',
        customer_name:name,
        customer_email:email,
        customer_phone:phone,
        plan:plan,
        period:period,
        payment_method:method,
        amount:amount
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error || 'Failed');
      return;
    }

    alert('SUCCESS! License Key: ' + data.license.license_key);

  }catch(e){
    console.error(e);
    alert('Error');
  }
}
</script>
