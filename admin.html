<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KitaTrack Admin</title>
<meta name="theme-color" content="#16a34a">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--g:#16a34a;--gd:#15803d;--gl:#f0fdf4;--s:#1e293b;--gr:#64748b;--lt:#f8fafc;--wh:#fff;--bd:#e2e8f0;--r:#dc2626;--b:#2563eb;--p:#9333ea;--y:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--lt);color:var(--s);min-height:100vh;padding-bottom:70px}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:inherit;width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--bd);font-size:14px;background:var(--wh)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--g);outline-offset:-1px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* Header */
.hdr{position:sticky;top:0;z-index:50;background:var(--wh);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center}
.hdr-t{font-weight:800;font-size:16px;color:var(--g)}
.hdr-s{font-size:10px;color:var(--gr)}
.hdr-r{display:flex;align-items:center;gap:8px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--g)}
.offline-dot{background:var(--r)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-top:1px solid var(--bd);display:flex;z-index:50;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0;background:none;font-size:10px;color:var(--gr);gap:2px;position:relative}
.bnav button.act{color:var(--g);font-weight:700}
.bnav .ic{font-size:20px}

/* Cards */
.page{padding:16px}
.card{background:var(--wh);border-radius:14px;border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.card-t{font-size:11px;color:var(--gr);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.card-v{font-size:24px;font-weight:800;margin-top:2px}
.card-row{display:flex;gap:8px}
.card-row .card{flex:1;min-width:0}

/* Stat colors */
.stat-green .card-v{color:var(--g)}
.stat-blue .card-v{color:var(--b)}
.stat-red .card-v{color:var(--r)}
.stat-purple .card-v{color:var(--p)}
.stat-yellow .card-v{color:var(--y)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:12px;font-weight:700;font-size:14px;transition:all .15s}
.btn-g{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff}
.btn-g:hover{opacity:.9}
.btn-o{background:var(--gl);color:var(--g);border:1px solid #bbf7d0}
.btn-r{background:#fef2f2;color:var(--r);border:1px solid #fecaca}
.btn-b{background:#eff6ff;color:var(--b);border:1px solid #bfdbfe}
.btn-full{width:100%}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}

/* Form */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--gr);margin-bottom:4px}
.form-row{display:flex;gap:10px}
.form-row>*{flex:1}

/* Table/List */
.list-item{display:flex;align-items:center;padding:12px;background:var(--wh);border-radius:12px;border:1px solid var(--bd);margin-bottom:6px;gap:10px;cursor:pointer;transition:all .15s}
.list-item:hover{border-color:var(--g);background:var(--gl)}
.list-item:active{transform:scale(.99)}
.li-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:12px;color:var(--gr);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-right{text-align:right;flex-shrink:0}
.li-amount{font-weight:700;font-size:14px;color:var(--g)}
.li-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;display:inline-block}
.st-active{background:var(--gl);color:var(--g)}
.st-pending{background:#fef3c7;color:#92400e}
.st-expired{background:#fef2f2;color:var(--r)}
.st-suspended{background:#f1f5f9;color:var(--gr)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--wh);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-h{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--bd)}
.modal-h h3{font-size:18px;font-weight:800}
.modal-close{background:none;font-size:20px;color:var(--gr);padding:4px}
.modal-body{padding:18px}

/* Search */
.search-box{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--wh);border-radius:10px;border:1px solid var(--bd);margin-bottom:12px}
.search-box input{border:none;outline:none;padding:0;font-size:14px}

/* Filter pills */
.pills{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:#f1f5f9;color:var(--gr);white-space:nowrap}
.pill.act{background:var(--g);color:#fff}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--g);color:#fff;padding:10px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.err{background:var(--r)}

/* License success card */
.success-card{text-align:center;padding:20px 0}
.success-icon{width:64px;height:64px;border-radius:50%;background:var(--gl);color:var(--g);font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.key-display{background:var(--lt);border:2px dashed var(--g);border-radius:12px;padding:14px;margin:14px 0;font-family:monospace;font-size:16px;font-weight:700;color:var(--g);word-break:break-all;letter-spacing:1px}
.msg-preview{background:var(--lt);border-radius:12px;padding:14px;margin:14px 0;font-size:13px;color:var(--s);text-align:left;white-space:pre-line;line-height:1.5;border:1px solid var(--bd)}
.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}

/* Detail view */
.detail-section{margin-bottom:20px}
.detail-section h4{font-size:13px;font-weight:700;color:var(--gr);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--gr)}
.detail-value{font-weight:600;text-align:right;max-width:60%;word-break:break-all}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--gr)}
.empty .ic{font-size:40px;margin-bottom:10px}

/* Section header */
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-title{font-size:18px;font-weight:800}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="logo">K</div>
    <div><div class="hdr-t">KitaTrack Admin</div><div class="hdr-s" id="hdrSub">Dashboard</div></div>
  </div>
  <div class="hdr-r">
    <div id="onlineStatus" class="online-dot"></div>
    <span style="font-size:11px;color:var(--gr)" id="onlineText">Online</span>
  </div>
</header>

<div id="app"></div>

<nav class="bnav">
  <button onclick="go('dashboard')" id="nav-dashboard" class="act"><span class="ic">📊</span>Dashboard</button>
  <button onclick="go('create')" id="nav-create"><span class="ic">➕</span>Create</button>
  <button onclick="go('licenses')" id="nav-licenses"><span class="ic">🔑</span>Licenses</button>
  <button onclick="go('payments')" id="nav-payments"><span class="ic">💰</span>Payments</button>
</nav>

<div id="toastEl" style="display:none"></div>
<div id="modalEl"></div>

<script>
// ===== SUPABASE CONFIG =====
const SB_URL='https://lrixoqxtgfnwadbospae.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyaXhvcXh0Z2Zud2FkYm9zcGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMjY5ODksImV4cCI6MjA5MDcwMjk4OX0.cVg3UDzPdIAgLci7TYWeschTR1tZCzXxcC-DQW6J1QY';

const sbHeaders={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

// ===== SUPABASE API HELPERS =====
async function sbGet(table,query=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${query}&order=created_at.desc`,{headers:{...sbHeaders}});
  return r.ok?await r.json():[];
}
async function sbInsert(table,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{...sbHeaders,'Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.ok?await r.json():null;
}
async function sbUpdate(table,id,data){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'PATCH',headers:{...sbHeaders,'Prefer':'return=representation'},body:JSON.stringify(data)});
  return r.ok?await r.json():null;
}
async function sbDelete(table,id){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:sbHeaders});
  return r.ok;
}

// ===== STATE =====
let currentPage='dashboard';
let licenses=[];
let payments=[];
let searchQ='';
let filterStatus='all';
let currentModal=null;

// ===== HELPERS =====
const peso=n=>'₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2});
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'}):'—';
const fmtTime=d=>d?new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'}):'';
const fmtDT=d=>d?fmtDate(d)+' '+fmtTime(d):'—';

function genKey(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let key='';
  for(let i=0;i<16;i++){key+=chars[Math.floor(Math.random()*chars.length)];if(i===3||i===7||i===11)key+='-';}
  return key;
}

function calcExpiry(period){
  if(period==='lifetime')return null;
  const now=new Date();
  if(period==='daily')now.setDate(now.getDate()+1);
  else if(period==='monthly')now.setMonth(now.getMonth()+1);
  else if(period==='trial')now.setDate(now.getDate()+3);
  return now.toISOString();
}

function statusDot(s){
  const colors={active:'var(--g)',pending:'var(--y)',expired:'var(--r)',suspended:'var(--gr)'};
  return `<div class="li-dot" style="background:${colors[s]||'var(--gr)'}"></div>`;
}
function statusBadge(s){
  const cls={active:'st-active',pending:'st-pending',expired:'st-expired',suspended:'st-suspended'};
  return `<span class="li-status ${cls[s]||'st-suspended'}">${s}</span>`;
}

function genMessage(lic){
  return `Hi ${lic.customer_name}! 👋

Your KitaTrack POS is now activated ✅

🔑 License Key:
${lic.license_key}

📦 Plan: ${(lic.plan||'').charAt(0).toUpperCase()+(lic.plan||'').slice(1)}
📅 ${lic.period==='lifetime'?'Lifetime (never expires)':'Valid until: '+fmtDate(lic.expires_at)}

👉 Open the app and enter your key to start.

Salamat! 🙏
— KitaTrack POS Team`;
}

function toast(msg,err){
  const el=document.getElementById('toastEl');
  el.className='toast'+(err?' err':'');
  el.textContent=msg;
  el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

async function copyText(text){
  try{await navigator.clipboard.writeText(text);toast('Copied!');}
  catch{toast('Copy failed',true);}
}

// ===== NAVIGATION =====
function go(page){
  currentPage=page;
  searchQ='';filterStatus='all';
  document.querySelectorAll('.bnav button').forEach(b=>b.classList.remove('act'));
  const navBtn=document.getElementById('nav-'+page);
  if(navBtn)navBtn.classList.add('act');
  document.getElementById('hdrSub').textContent={dashboard:'Dashboard',create:'Create License',licenses:'Licenses',payments:'Payments'}[page]||'';
  render();
}

// ===== DATA LOADING =====
async function loadData(){
  try{
    licenses=await sbGet('licenses','select=*');
    payments=await sbGet('payments','select=*');
  }catch(e){
    console.error('Load error:',e);
    toast('Failed to load data',true);
  }
  render();
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  
  if(currentPage==='dashboard')app.innerHTML=renderDashboard();
  else if(currentPage==='create')app.innerHTML=renderCreate();
  else if(currentPage==='licenses')app.innerHTML=renderLicenses();
  else if(currentPage==='payments')app.innerHTML=renderPayments();
}

// ===== DASHBOARD =====
function renderDashboard(){
  const active=licenses.filter(l=>l.status==='active').length;
  const expired=licenses.filter(l=>l.status==='expired').length;
  const pending=licenses.filter(l=>l.status==='pending').length;
  const total=licenses.length;
  const revenue=licenses.filter(l=>l.status==='active'||l.status==='expired').reduce((s,l)=>s+Number(l.amount||0),0);
  const today=new Date().toDateString();
  const todayLicenses=licenses.filter(l=>new Date(l.created_at).toDateString()===today);
  const todayRevenue=todayLicenses.reduce((s,l)=>s+Number(l.amount||0),0);

  let h=`<div class="page">
    <div class="card-row">
      <div class="card stat-green"><div class="card-t">Today's Revenue</div><div class="card-v">${peso(todayRevenue)}</div><div style="font-size:12px;color:var(--gr)">${todayLicenses.length} license(s)</div></div>
      <div class="card stat-blue"><div class="card-t">Total Revenue</div><div class="card-v">${peso(revenue)}</div></div>
    </div>
    <div class="card-row">
      <div class="card stat-green"><div class="card-t">Active</div><div class="card-v">${active}</div></div>
      <div class="card stat-yellow"><div class="card-t">Pending</div><div class="card-v">${pending}</div></div>
      <div class="card stat-red"><div class="card-t">Expired</div><div class="card-v">${expired}</div></div>
    </div>
    <div class="card"><div class="card-t">Total Customers</div><div class="card-v">${total}</div></div>

    <div class="sec-header" style="margin-top:20px"><div class="sec-title">Recent Activity</div></div>`;

  const recent=licenses.slice(0,10);
  if(!recent.length)h+=`<div class="empty"><div class="ic">📋</div>No licenses yet.<br>Create your first license!</div>`;
  else recent.forEach(l=>{
    h+=`<div class="list-item" onclick="showLicenseDetail('${l.id}')">
      ${statusDot(l.status)}
      <div class="li-info"><div class="li-name">${l.customer_name||'Unknown'}</div><div class="li-sub">${(l.plan||'').charAt(0).toUpperCase()+(l.plan||'').slice(1)} · ${l.period} · ${fmtDate(l.created_at)}</div></div>
      <div class="li-right"><div class="li-amount">${peso(l.amount)}</div>${statusBadge(l.status)}</div>
    </div>`;
  });

  h+=`</div>`;
  return h;
}

// ===== CREATE LICENSE =====
function renderCreate(){
  return `<div class="page">
    <div class="card">
      <h3 style="font-weight:800;font-size:16px;margin-bottom:16px">➕ Create New License</h3>
      <div class="form-group"><label class="form-label">Customer Name *</label><input id="cName" placeholder="Juan Dela Cruz"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Email</label><input id="cEmail" type="email" placeholder="Optional"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="cPhone" placeholder="09XX XXX XXXX"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Plan *</label><select id="cPlan"><option value="basic">Basic</option><option value="business">Business</option><option value="pro">Pro</option><option value="custom">Custom</option></select></div>
        <div class="form-group"><label class="form-label">Period *</label><select id="cPeriod" onchange="updateAmount()"><option value="daily">Daily</option><option value="monthly">Monthly</option><option value="lifetime">Lifetime</option><option value="trial">Trial (3 days)</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Payment Method</label><select id="cMethod"><option value="cash">Cash</option><option value="gcash">GCash</option><option value="maya">Maya</option><option value="free">Free Trial</option></select></div>
        <div class="form-group"><label class="form-label">Amount (₱)</label><input id="cAmount" type="number" placeholder="0" value="50"></div>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea id="cNotes" rows="2" placeholder="Optional notes..."></textarea></div>
      <button class="btn btn-g btn-full" onclick="createLicense()" style="margin-top:8px">🔑 Create & Activate License</button>
    </div>

    <div class="card" style="background:var(--gl);border-color:#bbf7d0">
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">💡 Quick Pricing Guide</div>
      <div style="font-size:13px;color:var(--gr);line-height:1.8">
        <strong>Basic:</strong> ₱50/day · ₱1,200/month · ₱3,000 lifetime<br>
        <strong>Business:</strong> ₱70/day · ₱2,000/month · ₱5,000 lifetime<br>
        <strong>Pro:</strong> ₱100/day · ₱3,000/month · ₱8,000+ lifetime<br>
        <strong>Trial:</strong> ₱0 (3 days free — Basic only)
      </div>
    </div>
  </div>`;
}

function updateAmount(){
  const plan=document.getElementById('cPlan').value;
  const period=document.getElementById('cPeriod').value;
  const prices={
    basic:{daily:50,monthly:1200,lifetime:3000,trial:0},
    business:{daily:70,monthly:2000,lifetime:5000,trial:0},
    pro:{daily:100,monthly:3000,lifetime:8000,trial:0},
    custom:{daily:100,monthly:3000,lifetime:10000,trial:0}
  };
  const amt=prices[plan]?.[period]||0;
  document.getElementById('cAmount').value=amt;
  if(period==='trial')document.getElementById('cMethod').value='free';
}

async function createLicense(){
  const name=document.getElementById('cName').value.trim();
  const email=document.getElementById('cEmail').value.trim();
  const phone=document.getElementById('cPhone').value.trim();
  const plan=document.getElementById('cPlan').value;
  const period=document.getElementById('cPeriod').value;
  const method=document.getElementById('cMethod').value;
  const amount=document.getElementById('cAmount').value;
  const notes=document.getElementById('cNotes').value.trim();

  if(!name){toast('Please enter customer name',true);return;}

  const key=genKey();
  const now=new Date().toISOString();
  const expires=calcExpiry(period);

  const data={
    customer_name:name,
    customer_email:email||null,
    customer_phone:phone||null,
    plan,period,
    payment_method:method,
    amount:Number(amount)||0,
    license_key:key,
    status:'active',
    activated_at:now,
    expires_at:expires,
    notes:notes||null
  };

  const result=await sbInsert('licenses',data);
  if(result&&result.length>0){
    const lic=result[0];
    licenses.unshift(lic);
    showSuccessModal(lic);
    toast('License created! ✓');
  }else{
    toast('Failed to create license',true);
  }
}

// ===== LICENSE LIST =====
function renderLicenses(){
  let filtered=licenses;
  if(filterStatus!=='all')filtered=filtered.filter(l=>l.status===filterStatus);
  if(searchQ)filtered=filtered.filter(l=>
    (l.customer_name||'').toLowerCase().includes(searchQ.toLowerCase())||
    (l.license_key||'').toLowerCase().includes(searchQ.toLowerCase())||
    (l.customer_email||'').toLowerCase().includes(searchQ.toLowerCase())
  );

  let h=`<div class="page">
    <div class="search-box"><span>🔍</span><input placeholder="Search name, key, email..." value="${searchQ}" oninput="searchQ=this.value;render()"></div>
    <div class="pills">
      <button class="pill${filterStatus==='all'?' act':''}" onclick="filterStatus='all';render()">All (${licenses.length})</button>
      <button class="pill${filterStatus==='active'?' act':''}" onclick="filterStatus='active';render()">Active (${licenses.filter(l=>l.status==='active').length})</button>
      <button class="pill${filterStatus==='pending'?' act':''}" onclick="filterStatus='pending';render()">Pending (${licenses.filter(l=>l.status==='pending').length})</button>
      <button class="pill${filterStatus==='expired'?' act':''}" onclick="filterStatus='expired';render()">Expired (${licenses.filter(l=>l.status==='expired').length})</button>
      <button class="pill${filterStatus==='suspended'?' act':''}" onclick="filterStatus='suspended';render()">Suspended (${licenses.filter(l=>l.status==='suspended').length})</button>
    </div>`;

  if(!filtered.length)h+=`<div class="empty"><div class="ic">🔑</div>No licenses found.</div>`;
  else filtered.forEach(l=>{
    h+=`<div class="list-item" onclick="showLicenseDetail('${l.id}')">
      ${statusDot(l.status)}
      <div class="li-info"><div class="li-name">${l.customer_name||'Unknown'}</div><div class="li-sub">${l.license_key||'—'}</div></div>
      <div class="li-right"><div class="li-amount">${peso(l.amount)}</div>${statusBadge(l.status)}</div>
    </div>`;
  });

  h+=`</div>`;
  return h;
}

// ===== PAYMENTS =====
function renderPayments(){
  let h=`<div class="page">
    <div class="sec-header"><div class="sec-title">Payments</div><button class="btn btn-o btn-sm" onclick="showRecordPayment()">+ Record</button></div>`;

  if(!payments.length)h+=`<div class="empty"><div class="ic">💰</div>No payments recorded yet.</div>`;
  else payments.forEach(p=>{
    const lic=licenses.find(l=>l.id===p.license_id);
    h+=`<div class="list-item">
      <div style="font-size:20px">${p.verified?'✅':'⏳'}</div>
      <div class="li-info"><div class="li-name">${lic?.customer_name||'Unknown'}</div><div class="li-sub">${p.method||'—'} · ${p.reference_number||'No ref'} · ${fmtDate(p.created_at)}</div></div>
      <div class="li-right"><div class="li-amount">${peso(p.amount)}</div>
        ${p.verified?'<span class="li-status st-active">Verified</span>':'<button class="btn btn-o btn-sm" onclick="event.stopPropagation();verifyPayment(\''+p.id+'\')">Verify</button>'}
      </div>
    </div>`;
  });

  h+=`</div>`;
  return h;
}

// ===== MODALS =====

      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-h"><h3>License Created! 🎉</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">

            <h3 style="font-size:18px;font-weight:800;margin-bottom:4px">${lic.customer_name}</h3>
            <p style="color:var(--gr);font-size:14px">${(lic.plan||'').charAt(0).toUpperCase()+(lic.plan||'').slice(1)} · ${lic.period}</p>

function showRecordPayment(){
  let opts=licenses.map(l=>`<option value="${l.id}">${l.customer_name} (${l.license_key?.slice(0,8)}...)</option>`).join('');
  
  document.getElementById('modalEl').innerHTML=`
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-h"><h3>Record Payment</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
        <div class="modal-body">
          <div class="form-group"><label class="form-label">Customer License *</label><select id="pLicense">${opts}</select></div>
          <div class="form-row">
            <div class="form-group"><label class="form-label">Amount (₱)</label><input id="pAmount" type="number" placeholder="0"></div>
            <div class="form-group"><label class="form-label">Method</label><select id="pMethod"><option value="cash">Cash</option><option value="gcash">GCash</option><option value="maya">Maya</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Reference #</label><input id="pRef" placeholder="Optional"></div>
          <button class="btn btn-g btn-full" onclick="recordPayment()">💰 Record Payment</button>

      </div>

// ===== ACTIONS =====
async function updateLicenseStatus(id,status){
  const update={status};
  if(status==='active'){update.activated_at=new Date().toISOString();}
  const result=await sbUpdate('licenses',id,update);
  if(result){
    const idx=licenses.findIndex(l=>l.id===id);
    if(idx>=0)Object.assign(licenses[idx],update);
    toast('Status updated!');
    closeModal();render();
  }else toast('Update failed',true);
}

async function deleteLicense(id){
  const ok=await sbDelete('licenses',id);
  if(ok){
    licenses=licenses.filter(l=>l.id!==id);
    toast('License deleted');
    closeModal();render();
  }else toast('Delete failed',true);
}

async function recordPayment(){
  const licenseId=document.getElementById('pLicense').value;
  const amount=document.getElementById('pAmount').value;
  const method=document.getElementById('pMethod').value;
  const ref=document.getElementById('pRef').value.trim();

  if(!licenseId||!amount){toast('Fill in required fields',true);return;}

  const data={license_id:licenseId,amount:Number(amount),method,reference_number:ref||null,verified:false};
  const result=await sbInsert('payments',data);
  if(result){
    payments.unshift(result[0]||result);
    toast('Payment recorded!');
    closeModal();render();
  }else toast('Failed to record payment',true);
}

async function verifyPayment(id){
  const result=await sbUpdate('payments',id,{verified:true,verified_at:new Date().toISOString()});
  if(result){
    const idx=payments.findIndex(p=>p.id===id);
    if(idx>=0){payments[idx].verified=true;}
    toast('Payment verified!');
    render();
  }else toast('Verification failed',true);
}

// ===== ONLINE STATUS =====
function updateOnlineStatus(){
  const dot=document.getElementById('onlineStatus');
  const text=document.getElementById('onlineText');
  if(navigator.onLine){dot.className='online-dot';text.textContent='Online';}
  else{dot.className='online-dot offline-dot';text.textContent='Offline';}
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);

// ===== AUTO REFRESH =====
setInterval(()=>{if(navigator.onLine)loadData();},60000);

// ===== INIT =====
updateOnlineStatus();
loadData();
</script>
