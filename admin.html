<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KitaTrack Admin</title>

<style>
body{font-family:sans-serif;background:#f8fafc;margin:0}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;margin-bottom:15px;border:1px solid #e2e8f0}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.btn-g{background:#16a34a;color:#fff}
.btn-r{background:#dc2626;color:#fff}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>
<div class="container">
  <h2>KitaTrack Admin</h2>

  <div id="orders"></div>
</div>

<script>
const API = "/api/admin";

async function fetchOrders(){
  const res = await fetch(API + "?mode=orders", {
    headers: {
      "x-admin-pin": "0715"
    }
  });

  const data = await res.json();
  renderOrders(data.orders || []);
}

function renderOrders(list){
  const el = document.getElementById("orders");
  el.innerHTML = "";

  if(!list.length){
    el.innerHTML = "<p>No orders</p>";
    return;
  }

  list.forEach(o=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${o.customer_name || "Unknown"}</h3>
      <p><b>Email:</b> ${o.customer_email || "-"}</p>
      <p><b>Phone:</b> ${o.customer_phone || "-"}</p>
      <p><b>Plan:</b> ${o.plan}</p>
      <p><b>Period:</b> ${o.period}</p>
      <p><b>Amount:</b> ₱${o.amount}</p>
      <p><b>Ref:</b> ${o.reference_number || "-"}</p>
      <p><b>Status:</b> ${o.status}</p>

      ${o.status === "pending" ? `
        <button class="btn-g" onclick="verify('${o.id}')">Verify</button>
        <button class="btn-r" onclick="reject('${o.id}')">Reject</button>
      ` : ""}
    `;

    el.appendChild(div);
  });
}

async function verify(id){
  try{
    const res = await fetch(API,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-admin-pin":"0715"
      },
      body: JSON.stringify({
        action:"verify_order",
        id
      })
    });

    const data = await res.json();

    if(!res.ok){
      alert(data.error || "Error");
      return;
    }

    alert("Order verified!");
    fetchOrders();

  }catch(e){
    alert("Error verifying");
  }
}

async function reject(id){
  const res = await fetch(API,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-admin-pin":"0715"
    },
    body: JSON.stringify({
      action:"reject_order",
      id
    })
  });

  const data = await res.json();

  if(!res.ok){
    alert(data.error || "Error");
    return;
  }

  alert("Order rejected");
  fetchOrders();
}

fetchOrders();
</script>
</body>
</html>
