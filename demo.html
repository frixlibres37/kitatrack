<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>KitaTrack POS — Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;color:#1e293b;height:100vh;overflow:hidden}
button{border:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input,select{font-family:inherit}
input:focus,select:focus{outline:2px solid var(--ac);outline-offset:-1px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

:root{--ac:#16a34a}

.app{display:flex;flex-direction:column;height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0}
.hdr-l{display:flex;align-items:center;gap:8px}
.logo{width:34px;height:34px;border-radius:10px;color:#fff;font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center}
.hdr-t{font-weight:800;font-size:15px}
.hdr-s{font-size:10px;color:#94a3b8}
.badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:14px;border:1px solid}
.demo-badge{background:#fef3c7;color:#92400e;border-color:#fde68a;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.main{flex:1;overflow-y:auto;overflow-x:hidden}
.nav{display:flex;border-top:1px solid #e2e8f0;background:#fff;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;padding:5px 0;background:none;font-size:10px;color:#94a3b8;gap:2px}
.nav button.act{color:var(--ac);font-weight:700}

/* Stats */
.stats{display:flex;gap:6px;padding:8px 14px;overflow-x:auto}
.stat{flex:0 0 auto;min-width:105px;padding:8px 10px;background:#fff;border-radius:10px;border:1px solid #e2e8f0}
.stat-l{font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-v{font-size:18px;font-weight:800;color:var(--ac)}

/* Search & Categories */
.sbox{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border-radius:10px;border:1px solid #e2e8f0;margin:0 14px 8px}
.sbox input{flex:1;border:none;outline:none;font-size:14px;background:transparent}
.cats{display:flex;gap:4px;padding:0 14px 8px;overflow-x:auto}
.cat{flex:0 0 auto;padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600;background:#f1f5f9;color:#475569}
.cat.act{background:var(--ac);color:#fff}

/* Product Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:6px;padding:0 14px 90px}
.pcard{padding:10px 8px;border-radius:10px;border:2px solid #e2e8f0;text-align:left;position:relative;min-height:75px;background:#fff}
.pcard.in{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 5%,#fff)}
.pcard .nm{font-weight:700;font-size:12px;line-height:1.3;margin-bottom:2px}
.pcard .pr{font-weight:800;font-size:14px;color:var(--ac)}
.pcard .st{font-size:9px;font-weight:600;margin-top:2px;color:#94a3b8}
.pcard .qb{position:absolute;top:4px;right:4px;background:var(--ac);color:#fff;font-size:10px;font-weight:700;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Float cart */
.fcart{position:fixed;bottom:58px;left:12px;right:12px;color:#fff;padding:12px 18px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;z-index:50}

/* Cart panel */
.cpanel{position:fixed;bottom:0;left:0;right:0;top:30%;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 30px rgba(0,0,0,.12);display:flex;flex-direction:column;z-index:60}
.cpanel .ch{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f1f5f9}
.cpanel .ci{flex:1;overflow-y:auto;padding:0 16px}
.citem{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid #f8fafc;gap:6px}
.qbtn{width:28px;height:28px;border-radius:7px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.cpanel .cf{padding:12px 16px;border-top:1px solid #e2e8f0}

/* Overlay/Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:1px solid #f1f5f9}

/* Big button */
.bigbtn{width:100%;padding:13px;border-radius:12px;color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center}

/* List rows */
.row{display:flex;align-items:center;padding:10px;background:#fff;border-radius:10px;border:1px solid #e2e8f0;gap:5px;margin-bottom:5px}

/* Toast */
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);color:#fff;padding:9px 18px;border-radius:12px;font-weight:600;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:opacity .3s}

/* Empty state */
.empty{padding:30px 20px;text-align:center;color:#94a3b8;font-size:14px}

/* Quick amounts */
.qk{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.qk button{padding:7px 12px;border-radius:8px;font-weight:600;font-size:13px;background:#f1f5f9;color:#334155}
.qk button.act{background:var(--ac);color:#fff}

/* Back to website */
.back-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:none;color:var(--ac);font-weight:600;font-size:13px;text-decoration:none}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ===== GET PLAN FROM URL =====
const params=new URLSearchParams(window.location.search);
const PLAN=params.get('plan')||'basic';
const COLORS={basic:'#16a34a',business:'#2563eb',pro:'#9333ea'};
const AC=COLORS[PLAN]||'#16a34a';
document.documentElement.style.setProperty('--ac',AC);

const FEATURES={
  basic:['pos','products','history','dailySales'],
  business:['pos','products','history','dailySales','inventory','reports'],
  pro:['pos','products','history','dailySales','inventory','reports','barcode','userSystem','advancedReports']
};
const has=f=>FEATURES[PLAN]?.includes(f);

// ===== PRODUCTS =====
let products=[
  {id:1,name:"Yosi (per stick)",price:8,stock:200,cat:"tobacco"},
  {id:2,name:"Coke Mismo",price:15,stock:48,cat:"drinks"},
  {id:3,name:"Royal Mismo",price:15,stock:36,cat:"drinks"},
  {id:4,name:"C2 Apple",price:25,stock:24,cat:"drinks"},
  {id:5,name:"Kopiko 78°C",price:30,stock:20,cat:"drinks"},
  {id:6,name:"Lucky Me Pancit Canton",price:14,stock:60,cat:"food"},
  {id:7,name:"Sky Flakes",price:8,stock:40,cat:"food"},
  {id:8,name:"Boy Bawang",price:10,stock:30,cat:"food"},
  {id:9,name:"Safeguard Sachet",price:8,stock:50,cat:"essentials"},
  {id:10,name:"Surf Powder (tingi)",price:7,stock:80,cat:"essentials"},
  {id:11,name:"Load ₱10",price:10,stock:999,cat:"services"},
  {id:12,name:"Bigas (per kilo)",price:55,stock:50,cat:"food"},
  {id:13,name:"Nescafe 3-in-1",price:8,stock:100,cat:"drinks"},
  {id:14,name:"Piattos Cheese",price:18,stock:25,cat:"food"},
];
let cart=[];
let sales=[];
let screen='pos';
let selCat='all';
let search='';
let showCart=false;
let showCheckout=false;
let toast=null;

const peso=n=>'₱'+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2});
const fmtDate=d=>new Date(d).toLocaleDateString('en-PH',{month:'short',day:'numeric'});
const fmtTime=d=>new Date(d).toLocaleTimeString('en-PH',{hour:'numeric',minute:'2-digit'});

function showToast(msg,err){
  toast={msg,err};render();
  setTimeout(()=>{toast=null;render();},2000);
}

function addToCart(p){
  if(has('inventory')&&p.stock<=0)return showToast('Out of stock!',true);
  const ex=cart.find(c=>c.id===p.id);
  if(ex){if(has('inventory')&&ex.qty>=p.stock)return showToast('Max stock!',true);ex.qty++;}
  else cart.push({...p,qty:1});
  render();
}
function updQty(id,d){const c=cart.find(x=>x.id===id);if(c)c.qty=Math.max(1,c.qty+d);render();}
function rmCart(id){cart=cart.filter(c=>c.id!==id);render();}
function cartTotal(){return cart.reduce((s,c)=>s+c.price*c.qty,0);}
function cartCount(){return cart.reduce((s,c)=>s+c.qty,0);}

function completeSale(cash){
  const total=cartTotal();
  sales.unshift({id:Date.now(),items:cart.map(c=>({...c})),total,cash,change:cash-total,date:new Date().toISOString()});
  if(has('inventory'))cart.forEach(c=>{const p=products.find(x=>x.id===c.id);if(p)p.stock=Math.max(0,p.stock-c.qty);});
  cart=[];showCheckout=false;showCart=false;
  showToast('Sale complete! ✓');
}

// ===== RENDER =====
function render(){
  const app=document.getElementById('app');
  const today=new Date().toDateString();
  const todaySales=sales.filter(s=>new Date(s.date).toDateString()===today);
  const todayTotal=todaySales.reduce((s,t)=>s+t.total,0);
  const filtered=products.filter(p=>{
    const mc=selCat==='all'||p.cat===selCat;
    const ms=!search||p.name.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });
  const cc=cartCount(),ct=cartTotal();

  let h=`
  <header class="hdr">
    <div class="hdr-l">
      <div class="logo" style="background:linear-gradient(135deg,${AC},${AC}dd)">K</div>
      <div><div class="hdr-t" style="color:${AC}">KitaTrack <span style="font-size:10px;font-weight:700;background:${AC};color:#fff;padding:1px 6px;border-radius:6px;margin-left:4px">${PLAN.charAt(0).toUpperCase()+PLAN.slice(1)}</span></div>
      <div class="hdr-s">POS System</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="demo-badge">⚡ DEMO MODE</div>
      <a href="index.html" class="back-link">✕</a>
    </div>
  </header>`;

  // Toast
  if(toast)h+=`<div class="toast" style="background:${toast.err?'#dc2626':AC}">${toast.msg}</div>`;

  h+=`<div class="main">`;

  if(screen==='pos'){
    h+=`<div class="stats">
      <div class="stat"><div class="stat-l">Sales Today</div><div class="stat-v">${peso(todayTotal)}</div></div>
      <div class="stat"><div class="stat-l">Transactions</div><div class="stat-v">${todaySales.length}</div></div>
    </div>
    <div class="sbox"><span style="color:#94a3b8">🔍</span><input placeholder="Search products..." value="${search}" oninput="search=this.value;render()"></div>
    <div class="cats">
      ${['all','drinks','food','essentials','tobacco','services'].map(c=>`<button class="cat${selCat===c?' act':''}" onclick="selCat='${c}';render()">${c==='all'?'📦 All':c==='drinks'?'🥤 Drinks':c==='food'?'🍜 Food':c==='essentials'?'🧴 Essentials':c==='tobacco'?'🚬 Tobacco':'📱 Services'}</button>`).join('')}
    </div>
    <div class="grid">
      ${filtered.map(p=>{
        const ic=cart.find(c=>c.id===p.id);
        const oos=has('inventory')&&p.stock<=0;
        return `<button class="pcard${ic?' in':''}" style="opacity:${oos?.4:1}" onclick="${oos?'':'addToCart(products.find(x=>x.id==='+p.id+'))'}">
          <div class="nm">${p.name}</div>
          <div class="pr">${peso(p.price)}</div>
          ${has('inventory')?`<div class="st" style="color:${p.stock<=5?'#dc2626':'#94a3b8'}">${oos?'OUT OF STOCK':'Stock: '+p.stock}</div>`:''}
          ${ic?`<div class="qb">${ic.qty}</div>`:''}
        </button>`;
      }).join('')}
      ${filtered.length===0?'<div class="empty">No products found.</div>':''}
    </div>`;

    // Float cart button
    if(cc>0&&!showCart)h+=`<button class="fcart" style="background:linear-gradient(135deg,${AC},${AC}dd)" onclick="showCart=true;render()">🛒 ${cc} items — ${peso(ct)}</button>`;

    // Cart panel
    if(showCart&&cc>0){
      h+=`<div class="cpanel">
        <div class="ch"><span style="font-weight:700;font-size:16px">Cart (${cc})</span><button onclick="showCart=false;render()" style="background:none;font-size:18px">✕</button></div>
        <div class="ci">
          ${cart.map(c=>`<div class="citem">
            <div style="flex:1"><div style="font-weight:600;font-size:14px">${c.name}</div><div style="color:#64748b;font-size:13px">${peso(c.price)} each</div></div>
            <div style="display:flex;align-items:center;gap:3px">
              <button class="qbtn" onclick="${c.qty<=1?`rmCart(${c.id})`:`updQty(${c.id},-1)`}">${c.qty<=1?'🗑':'−'}</button>
              <span style="font-weight:700;font-size:14px;min-width:20px;text-align:center">${c.qty}</span>
              <button class="qbtn" onclick="updQty(${c.id},1)">+</button>
            </div>
            <div style="font-weight:700;min-width:65px;text-align:right;font-size:14px">${peso(c.price*c.qty)}</div>
          </div>`).join('')}
        </div>
        <div class="cf">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:600"><span>Total</span><span style="font-size:22px;font-weight:800;color:${AC}">${peso(ct)}</span></div>
          <button class="bigbtn" style="background:linear-gradient(135deg,${AC},${AC}dd)" onclick="showCart=false;showCheckout=true;render()">Checkout</button>
        </div>
      </div>`;
    }
  }

  else if(screen==='history'){
    h+=`<div style="padding:14px"><h2 style="font-weight:800;font-size:16px;margin-bottom:10px">Sales History (${sales.length})</h2>`;
    if(!sales.length)h+=`<div class="empty">No transactions yet. Make a sale first!</div>`;
    else sales.forEach(s=>{
      h+=`<div class="row"><div style="flex:1"><div style="font-weight:600;font-size:14px">${fmtDate(s.date)} · ${fmtTime(s.date)}</div><div style="color:#64748b;font-size:12px">${s.items.length} item(s) · ${s.items.map(i=>i.name).join(', ')}</div></div><div style="font-weight:700;color:${AC}">${peso(s.total)}</div></div>`;
    });
    h+=`</div>`;
  }

  else if(screen==='reports'){
    const allTotal=sales.reduce((s,t)=>s+t.total,0);
    const pm={};sales.forEach(s=>s.items.forEach(it=>{pm[it.name]=(pm[it.name]||0)+it.qty;}));
    const top=Object.entries(pm).sort((a,b)=>b[1]-a[1]).slice(0,5);
    h+=`<div style="padding:14px"><h2 style="font-weight:800;font-size:16px;margin-bottom:10px">Reports</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        <div style="padding:12px;background:#fff;border-radius:12px;border:1px solid #e2e8f0"><div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase">Today</div><div style="font-size:20px;font-weight:800;color:${AC}">${peso(todayTotal)}</div><div style="font-size:11px;color:#94a3b8">${todaySales.length} txn</div></div>
        <div style="padding:12px;background:#fff;border-radius:12px;border:1px solid #e2e8f0"><div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase">All Time</div><div style="font-size:20px;font-weight:800;color:${AC}">${peso(allTotal)}</div><div style="font-size:11px;color:#94a3b8">${sales.length} txn</div></div>
      </div>
      <div style="font-weight:700;font-size:14px;margin-bottom:8px">🏆 Top Products</div>`;
    if(!top.length)h+=`<div class="empty">No data yet. Make some sales!</div>`;
    else top.forEach(([name,qty],i)=>{
      h+=`<div class="row"><span style="width:24px;height:24px;border-radius:7px;background:color-mix(in srgb,${AC} 15%,#fff);color:${AC};font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center">${i+1}</span><span style="flex:1;font-weight:600;font-size:14px">${name}</span><span style="color:${AC};font-weight:700">${qty} sold</span></div>`;
    });
    h+=`</div>`;
  }

  h+=`</div>`;

  // Nav
  const navItems=[
    {key:'pos',label:'Sales',icon:'🛒'},
    {key:'history',label:'History',icon:'📋'},
    ...(has('reports')?[{key:'reports',label:'Reports',icon:'📊'}]:[]),
  ];
  h+=`<nav class="nav">${navItems.map(n=>`<button class="${screen===n.key?'act':''}" onclick="screen='${n.key}';render()"><span style="font-size:18px">${n.icon}</span>${n.label}${n.key==='pos'&&cc>0?`<span style="position:absolute;top:2px;right:50%;transform:translateX(12px);background:${AC};color:#fff;font-size:9px;font-weight:700;width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center">${cc}</span>`:''}</button>`).join('')}</nav>`;

  // Checkout modal
  if(showCheckout){
    h+=`<div class="overlay" onclick="if(event.target===this){showCheckout=false;render();}">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="mh"><span style="font-weight:700;font-size:18px">Checkout</span><button onclick="showCheckout=false;render()" style="background:none;font-size:18px">✕</button></div>
        <div style="padding:20px">
          <div style="background:#f8fafc;border-radius:10px;padding:10px;margin-bottom:12px">
            ${cart.map(c=>`<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:14px"><span>${c.name} ×${c.qty}</span><span style="font-weight:600">${peso(c.price*c.qty)}</span></div>`).join('')}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:2px solid #e2e8f0;margin-bottom:12px;font-weight:700"><span>TOTAL</span><span style="font-size:28px;font-weight:800;color:${AC}">${peso(ct)}</span></div>
          <div class="qk" id="qkAmounts">
            ${[20,50,100,200,500,1000].map(a=>`<button onclick="document.getElementById('cashIn').value=${a};document.getElementById('cashIn').dispatchEvent(new Event('input'))">${peso(a)}</button>`).join('')}
          </div>
          <label style="font-size:12px;font-weight:600;color:#64748b;margin-bottom:3px;display:block">Cash Received</label>
          <input id="cashIn" type="number" style="width:100%;padding:12px;border-radius:10px;border:2px solid #e2e8f0;font-size:22px;font-weight:700;text-align:center;margin-bottom:10px;background:#f8fafc" placeholder="0.00" oninput="updateChange()">
          <div id="changeBox" style="display:none;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:10px;border:2px solid;margin-bottom:12px"></div>
          <button id="completeBtn" class="bigbtn" style="background:#e2e8f0;color:#94a3b8" disabled onclick="var c=Number(document.getElementById('cashIn').value);if(c>=${ct})completeSale(c);">✓ Complete Sale</button>
        </div>
      </div>
    </div>`;
  }

  app.innerHTML=h;
}

function updateChange(){
  const cash=Number(document.getElementById('cashIn').value);
  const total=cartTotal();
  const box=document.getElementById('changeBox');
  const btn=document.getElementById('completeBtn');
  if(cash>0){
    const ok=cash>=total;
    const diff=Math.abs(cash-total);
    box.style.display='flex';
    box.style.background=ok?'#f0fdf4':'#fef2f2';
    box.style.borderColor=ok?AC:'#dc2626';
    box.innerHTML=`<span style="color:${ok?'#15803d':'#dc2626'};font-weight:600">${ok?'Change:':'Not enough:'}</span><span style="font-size:24px;font-weight:800;color:${ok?AC:'#dc2626'}">${peso(diff)}</span>`;
    btn.disabled=!ok;
    btn.style.background=ok?`linear-gradient(135deg,${AC},${AC}dd)`:'#e2e8f0';
    btn.style.color=ok?'#fff':'#94a3b8';
  } else {
    box.style.display='none';
    btn.disabled=true;
    btn.style.background='#e2e8f0';
    btn.style.color='#94a3b8';
  }
}

// Initial render
render();
</script>
</body>
</html>
